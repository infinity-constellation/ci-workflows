name: LLM comment enrichment
description: |
  Calls OpenRouter to produce enriched comment content for gravity-devops-agent
  PR comments. Returns structured markdown sections that callers inject into
  comments. Always fails open — on any error, outputs are empty strings and
  the caller falls back to static content.

inputs:
  event-type:
    description: |
      One of: plan | apply-success | apply-failure | ineligible-approval | apply-queued
    required: true
  context-json:
    description: |
      JSON object with all relevant context for the event. Shape varies by
      event-type — see the system prompt in the action body for each schema.
    required: true
  openrouter-api-key:
    description: "OpenRouter API key."
    required: true
  model:
    description: "OpenRouter model ID."
    required: false
    default: "openai/gpt-4o-mini"

outputs:
  display-name:
    description: "Short human-readable name for the primary stack(s)."
    value: ${{ steps.call.outputs.display_name }}
  summary:
    description: "One-sentence summary of the event."
    value: ${{ steps.call.outputs.summary }}
  details:
    description: "Structured markdown body with full context."
    value: ${{ steps.call.outputs.details }}
  cta:
    description: "Call-to-action for the reviewer/operator."
    value: ${{ steps.call.outputs.cta }}
  diagnosis:
    description: "Root cause diagnosis (postmortem / apply-failure only)."
    value: ${{ steps.call.outputs.diagnosis }}
  fix:
    description: "Concrete remediation steps (postmortem / apply-failure only)."
    value: ${{ steps.call.outputs.fix }}

runs:
  using: composite
  steps:
    - name: Call OpenRouter
      id: call
      continue-on-error: true
      shell: bash
      env:
        EVENT_TYPE: ${{ inputs.event-type }}
        CONTEXT_JSON: ${{ inputs.context-json }}
        OPENROUTER_API_KEY: ${{ inputs.openrouter-api-key }}
        MODEL: ${{ inputs.model }}
      run: |
        set -euo pipefail

        # ── System prompt ────────────────────────────────────────────────────
        SYSTEM_PROMPT='You are Gravity'"'"'s DevOps Agent — an automated infrastructure
        operations agent built by Infinity Constellation for the Gravity platform.
        You operate within GitHub Pull Requests, reviewing Terraform/Terragrunt
        infrastructure changes and guiding engineers through the plan → approve
        → apply lifecycle.

        Your voice is direct, technically precise, and confident. You write as a
        senior infrastructure engineer embedded in the team. You are not a generic
        assistant — your comments appear under the gravity-devops-agent identity
        in GitHub PR threads.

        TENSE RULES — strictly follow these:
          plan events     → future conditional tense only. Use "will be created",
                            "would add", "is planned to", "this change will".
                            Never use present tense as if the change already happened.
          apply-success   → past tense. "was created", "has been applied", "deployed".
          apply-failure   → past tense for what was attempted, present for the error.
          apply-queued    → near-future. "is about to be applied", "will run".

        OUTPUT FORMAT — respond with a raw JSON object with these exact fields:

          display_name  — Short human-readable name for the primary stack(s).
                          Strip path prefixes (live/, live/infinity/aws/, etc.),
                          collapse region slugs (us-east-2 → drop unless ambiguous),
                          use " · " as separator.
                          Examples: "ecr · infinity-factory-api",
                                    "production · eks-cluster",
                                    "staging · rds".

          summary       — ONE sentence. The single most important thing to know
                          about this event. Use future conditional tense for plans.
                          No sub-clauses, no lists.
                          Example: "This plan will create a private ECR repository
                          for the infinity-factory/api container image."

          details       — Structured markdown body with the full breakdown. Use
                          bold headers, bullet points, and inline code for resource
                          names and values. For plans: describe what will be created/
                          changed/destroyed, key configuration values, and any risks.
                          For applies: what was done and any follow-up actions.
                          For failures: what was attempted before failing.
                          Format example:
                          "**Resources**\n- `aws_ecr_repository.this` — ...\n\n
                          **Configuration**\n- Image mutability: IMMUTABLE\n- ...\n\n
                          **Risk**: Low — additive change only."

          cta           — One imperative sentence telling the reader what to do
                          next. Start with a verb.
                          Plan example: "Approve to provision the ECR repository
                          and lifecycle policy."
                          Failure example: "Fix the IAM permission and push a new
                          commit to re-trigger the plan."

          diagnosis     — (apply-failure, postmortem, comment-question only)
                          Root cause or answer, grounded in context. Quote the
                          key error line verbatim when diagnosing failures.
                          Empty string for plan/apply-success/apply-queued.

          fix           — (apply-failure and postmortem only) Numbered list of
                          concrete remediation steps with specific commands or
                          Terraform addresses. Empty string for other events.

        Respond with ONLY the raw JSON object. No markdown wrapper, no explanation
        outside the JSON. All field values are strings.'

        # ── Per-event user prompt ────────────────────────────────────────────
        case "$EVENT_TYPE" in
          plan)
            USER_PROMPT="This is a Terraform/Terragrunt PLAN — not an apply.
        Nothing has been changed yet. Use future conditional tense throughout.
        Context: $CONTEXT_JSON

        Produce:
        - display_name: short name for the stack
        - summary: one sentence — what this plan WILL do if approved
        - details: structured breakdown of what WILL BE created/changed/destroyed,
          key configuration values from the plan_excerpt, and risk assessment.
          Use future tense ('will be created', 'will add', 'would remove').
          Filter out any data source reads from the plan_excerpt — only describe
          actual resource changes.
        - cta: imperative sentence telling the reviewer to approve (or flag concerns)
        - diagnosis: empty string
        - fix: empty string"
            ;;
          apply-success)
            USER_PROMPT="Infrastructure apply SUCCEEDED. Use past tense.
        Context: $CONTEXT_JSON

        Produce:
        - display_name: short name for the applied stacks
        - summary: one sentence — what was applied
        - details: what was created/changed, any follow-up actions needed
          (new endpoints, DNS propagation, secrets rotation, etc.)
        - cta: brief closing note (PR will auto-merge)
        - diagnosis: empty string
        - fix: empty string"
            ;;
          apply-failure)
            USER_PROMPT="Infrastructure apply FAILED. Context: $CONTEXT_JSON

        Produce:
        - display_name: short name for the failed stack
        - summary: one sentence — what failed
        - details: what was attempted before the failure, which stacks applied ok
        - diagnosis: root cause from the error log — quote the key error line
        - fix: numbered remediation steps
        - cta: what to do to unblock"
            ;;
          ineligible-approval)
            USER_PROMPT="A PR approval was received but the approver does not
        have CODEOWNERS coverage for all affected paths.
        Context: $CONTEXT_JSON

        Produce:
        - display_name: stacks involved
        - summary: one sentence — why the approval did not trigger apply
        - details: which paths are unowned or who the valid approvers are
        - cta: exactly who needs to approve and how to request it
        - diagnosis: empty string
        - fix: empty string"
            ;;
          apply-queued)
            USER_PROMPT="A valid CODEOWNER approval just triggered an apply.
        Use near-future tense — the apply is about to run.
        Context: $CONTEXT_JSON

        Produce:
        - display_name: stacks being applied
        - summary: one sentence — what is about to be applied and by whom
        - details: list of stacks in apply order, what will happen
        - cta: what happens next (apply runs, then auto-merge on success)
        - diagnosis: empty string
        - fix: empty string"
            ;;
          comment-question)
            USER_PROMPT="An engineer addressed Gravity'"'"'s DevOps Agent in a PR comment.
        Context: $CONTEXT_JSON

        The context includes the question, available plan comments, and PR metadata.

        Produce:
        - display_name: stack or area being asked about (if identifiable)
        - summary: empty string
        - details: empty string
        - cta: empty string
        - diagnosis: direct answer grounded in the context. Reference actual
          resources, error lines, or plan details. Write as Gravity'"'"'s DevOps Agent.
        - fix: follow-up actions if relevant, otherwise empty string"
            ;;
          *)
            echo "Unknown event type: $EVENT_TYPE" >&2
            exit 1
            ;;
        esac

        # ── Build request payload ────────────────────────────────────────────
        PAYLOAD=$(jq -n \
          --arg model "$MODEL" \
          --arg system "$SYSTEM_PROMPT" \
          --arg user "$USER_PROMPT" \
          '{
            model: $model,
            messages: [
              {role: "system", content: $system},
              {role: "user",   content: $user}
            ],
            temperature: 0.3,
            max_tokens: 1200,
            response_format: {type: "json_object"}
          }')

        # ── Call OpenRouter ──────────────────────────────────────────────────
        RESPONSE=$(curl -s \
          --max-time 20 \
          -H "Authorization: Bearer $OPENROUTER_API_KEY" \
          -H "Content-Type: application/json" \
          -H "X-Title: gravity-devops-agent" \
          -d "$PAYLOAD" \
          https://openrouter.ai/api/v1/chat/completions)

        # ── Parse response ───────────────────────────────────────────────────
        RAW_CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty' 2>/dev/null || true)
        if [ -z "$RAW_CONTENT" ]; then
          API_ERR=$(echo "$RESPONSE" | jq -r '.error.message // .message // "unknown error"' 2>/dev/null || true)
          echo "::warning::LLM call failed (${API_ERR:-no response}) — falling back to static content"
          echo "display_name=" >> "$GITHUB_OUTPUT"
          echo "summary="      >> "$GITHUB_OUTPUT"
          echo "details="      >> "$GITHUB_OUTPUT"
          echo "cta="          >> "$GITHUB_OUTPUT"
          echo "diagnosis="    >> "$GITHUB_OUTPUT"
          echo "fix="          >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Extract each field, defaulting to empty string on missing keys.
        extract() { echo "$RAW_CONTENT" | jq -r --arg k "$1" '.[$k] // ""'; }

        DISPLAY_NAME=$(extract display_name)
        SUMMARY=$(extract summary)
        DETAILS=$(extract details)
        CTA=$(extract cta)
        DIAGNOSIS=$(extract diagnosis)
        FIX=$(extract fix)

        # Write multi-line outputs using heredoc delimiter syntax.
        {
          echo "display_name<<__LLM_EOF__"
          echo "$DISPLAY_NAME"
          echo "__LLM_EOF__"
          echo "summary<<__LLM_EOF__"
          echo "$SUMMARY"
          echo "__LLM_EOF__"
          echo "details<<__LLM_EOF__"
          echo "$DETAILS"
          echo "__LLM_EOF__"
          echo "cta<<__LLM_EOF__"
          echo "$CTA"
          echo "__LLM_EOF__"
          echo "diagnosis<<__LLM_EOF__"
          echo "$DIAGNOSIS"
          echo "__LLM_EOF__"
          echo "fix<<__LLM_EOF__"
          echo "$FIX"
          echo "__LLM_EOF__"
        } >> "$GITHUB_OUTPUT"
