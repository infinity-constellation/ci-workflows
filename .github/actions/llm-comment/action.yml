name: LLM comment enrichment
description: |
  Calls OpenRouter to produce enriched comment content for gravity-devops-agent
  PR comments. Returns structured markdown sections that callers inject into
  comments. Always fails open — on any error, outputs are empty strings and
  the caller falls back to static content.

inputs:
  event-type:
    description: |
      One of: plan | apply-success | apply-failure | ineligible-approval | apply-queued | comment-question
    required: true
  context-json:
    description: "JSON object with all relevant context for the event."
    required: true
  openrouter-api-key:
    description: "OpenRouter API key."
    required: true
  model:
    description: "OpenRouter model ID."
    required: false
    default: "openai/gpt-4o-mini"

outputs:
  display-name:
    description: "Short human-readable name for the primary stack(s)."
    value: ${{ steps.call.outputs.display_name }}
  summary:
    description: "One-sentence summary of the event."
    value: ${{ steps.call.outputs.summary }}
  details:
    description: "Structured markdown body with full context."
    value: ${{ steps.call.outputs.details }}
  cta:
    description: "Call-to-action for the reviewer/operator."
    value: ${{ steps.call.outputs.cta }}
  diagnosis:
    description: "Root cause diagnosis (postmortem / apply-failure only)."
    value: ${{ steps.call.outputs.diagnosis }}
  fix:
    description: "Concrete remediation steps (postmortem / apply-failure only)."
    value: ${{ steps.call.outputs.fix }}

runs:
  using: composite
  steps:
    - name: Call OpenRouter
      id: call
      continue-on-error: true
      shell: bash
      env:
        EVENT_TYPE: ${{ inputs.event-type }}
        CONTEXT_JSON: ${{ inputs.context-json }}
        OPENROUTER_API_KEY: ${{ inputs.openrouter-api-key }}
        MODEL: ${{ inputs.model }}
      run: |
        set -euo pipefail

        # ── Build prompts and payload via Python (avoids all shell quoting issues) ──
        PAYLOAD_FILE=$(mktemp)
        OUTPUT_FILE=$(mktemp)

        python3 - <<'PYEOF'
        import os, json, sys

        event_type   = os.environ["EVENT_TYPE"]
        context_json = os.environ["CONTEXT_JSON"]
        model        = os.environ["MODEL"]
        payload_file = os.environ.get("PAYLOAD_FILE", "/tmp/payload.json")

        SYSTEM = (
            "You are Gravity's DevOps Agent — an automated infrastructure operations agent "
            "built by Infinity Constellation for the Gravity platform. You operate within "
            "GitHub Pull Requests, reviewing Terraform/Terragrunt infrastructure changes and "
            "guiding engineers through the plan → approve → apply lifecycle.\n\n"
            "Your voice is direct, technically precise, and confident. You write as a senior "
            "infrastructure engineer embedded in the team. Your comments appear under the "
            "gravity-devops-agent identity in GitHub PR threads.\n\n"
            "TENSE RULES — strictly follow these:\n"
            "  plan events     → future conditional only. Use 'will be created', 'would add',\n"
            "                    'is planned to', 'this change will'. Never use present tense\n"
            "                    as if the change already happened.\n"
            "  apply-success   → past tense. 'was created', 'has been applied', 'deployed'.\n"
            "  apply-failure   → past tense for what was attempted, present for the error.\n"
            "  apply-queued    → near-future. 'is about to be applied', 'will run'.\n\n"
            "OUTPUT FORMAT — respond with a raw JSON object with exactly these fields "
            "(all string values, all markdown-formatted):\n\n"
            "  display_name  — Short human-readable stack name. Strip path prefixes "
            "(live/, live/infinity/aws/, etc.), collapse region slugs (us-east-2 → drop "
            "unless ambiguous), use ' · ' as separator. "
            "Examples: 'ecr · infinity-factory-api', 'production · eks-cluster'.\n\n"
            "  summary       — ONE sentence. The single most important thing to know. "
            "Use correct tense per TENSE RULES above.\n\n"
            "  details       — Structured markdown body. Use **bold headers**, bullet points, "
            "and `inline code` for resource names and values. For plans: describe what WILL BE "
            "created/changed/destroyed (future tense), key config values, risk assessment. "
            "For applies: what was done, follow-up actions. "
            "For failures: what was attempted.\n\n"
            "  cta           — One imperative sentence. Start with a verb. "
            "Plan example: 'Approve to provision the ECR repository and lifecycle policy.'\n\n"
            "  diagnosis     — (apply-failure, postmortem, comment-question only) "
            "Root cause or answer grounded in context. Quote key error lines verbatim. "
            "Empty string for plan/apply-success/apply-queued.\n\n"
            "  fix           — (apply-failure and postmortem only) Numbered remediation steps "
            "with specific commands or Terraform addresses. Empty string for other events.\n\n"
            "Respond with ONLY the raw JSON object. No markdown wrapper, no explanation "
            "outside the JSON. All field values are strings."
        )

        USER_PROMPTS = {
            "plan": (
                "This is a Terraform/Terragrunt PLAN — nothing has been changed yet. "
                "Use future conditional tense throughout ('will be created', 'would add'). "
                "Context: " + context_json + "\n\n"
                "Produce:\n"
                "- display_name: short name for the stack\n"
                "- summary: ONE sentence — what this plan WILL do if approved (future tense)\n"
                "- details: structured breakdown of what WILL BE created/changed/destroyed, "
                "key configuration values, risk assessment. Use future tense throughout. "
                "Filter out data source reads from plan_excerpt — only describe resource changes.\n"
                "- cta: imperative — tell reviewer to approve and what will happen\n"
                "- diagnosis: empty string\n"
                "- fix: empty string"
            ),
            "apply-success": (
                "Infrastructure apply SUCCEEDED. Use past tense. "
                "Context: " + context_json + "\n\n"
                "Produce:\n"
                "- display_name: short name for applied stacks\n"
                "- summary: ONE sentence — what was applied\n"
                "- details: what was created/changed, any follow-up actions needed "
                "(new endpoints, DNS propagation, secrets rotation, etc.)\n"
                "- cta: brief closing note (PR will auto-merge)\n"
                "- diagnosis: empty string\n"
                "- fix: empty string"
            ),
            "apply-failure": (
                "Infrastructure apply FAILED. Context: " + context_json + "\n\n"
                "Produce:\n"
                "- display_name: short name for the failed stack\n"
                "- summary: ONE sentence — what failed\n"
                "- details: what was attempted before the failure, which stacks applied ok\n"
                "- diagnosis: root cause from error log — quote the key error line verbatim\n"
                "- fix: numbered remediation steps with specific commands\n"
                "- cta: what to do to unblock"
            ),
            "ineligible-approval": (
                "A PR approval was received but the approver does not have CODEOWNERS coverage "
                "for all affected paths. Context: " + context_json + "\n\n"
                "Produce:\n"
                "- display_name: stacks involved\n"
                "- summary: ONE sentence — why the approval did not trigger apply\n"
                "- details: which paths are unowned or who the valid approvers are\n"
                "- cta: exactly who needs to approve and how to request it\n"
                "- diagnosis: empty string\n"
                "- fix: empty string"
            ),
            "apply-queued": (
                "A valid CODEOWNER approval just triggered an apply. Use near-future tense. "
                "Context: " + context_json + "\n\n"
                "Produce:\n"
                "- display_name: stacks being applied\n"
                "- summary: ONE sentence — what is about to be applied and by whom\n"
                "- details: list of stacks in apply order, what will happen\n"
                "- cta: what happens next (apply runs, then auto-merge on success)\n"
                "- diagnosis: empty string\n"
                "- fix: empty string"
            ),
            "comment-question": (
                "An engineer addressed Gravity's DevOps Agent in a PR comment. "
                "Context: " + context_json + "\n\n"
                "The context includes the question, available plan comments, and PR metadata.\n\n"
                "Produce:\n"
                "- display_name: stack or area being asked about if identifiable\n"
                "- summary: empty string\n"
                "- details: empty string\n"
                "- cta: empty string\n"
                "- diagnosis: direct answer grounded in the context. Reference actual "
                "resources, error lines, or plan details. Write as Gravity's DevOps Agent.\n"
                "- fix: follow-up actions if relevant, otherwise empty string"
            ),
        }

        if event_type not in USER_PROMPTS:
            print(f"Unknown event type: {event_type}", file=sys.stderr)
            sys.exit(1)

        payload = {
            "model": model,
            "messages": [
                {"role": "system", "content": SYSTEM},
                {"role": "user",   "content": USER_PROMPTS[event_type]},
            ],
            "temperature": 0.3,
            "max_tokens": 1200,
            "response_format": {"type": "json_object"},
        }

        with open(os.environ["PAYLOAD_FILE"], "w") as f:
            json.dump(payload, f)

        print("Payload written successfully")
        PYEOF

        # ── Call OpenRouter ──────────────────────────────────────────────────
        RESPONSE=$(curl -s \
          --max-time 20 \
          -H "Authorization: Bearer $OPENROUTER_API_KEY" \
          -H "Content-Type: application/json" \
          -H "X-Title: gravity-devops-agent" \
          -d "@$PAYLOAD_FILE" \
          https://openrouter.ai/api/v1/chat/completions)

        rm -f "$PAYLOAD_FILE"

        # ── Parse response ───────────────────────────────────────────────────
        RAW_CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty' 2>/dev/null || true)
        if [ -z "$RAW_CONTENT" ]; then
          API_ERR=$(echo "$RESPONSE" | jq -r '.error.message // .message // "unknown"' 2>/dev/null || true)
          echo "::warning::LLM call failed (${API_ERR:-no response}) — falling back to static content"
          {
            echo "display_name="
            echo "summary="
            echo "details="
            echo "cta="
            echo "diagnosis="
            echo "fix="
          } >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # ── Extract fields and write outputs ─────────────────────────────────
        extract() { echo "$RAW_CONTENT" | jq -r --arg k "$1" '.[$k] // ""'; }

        {
          echo "display_name<<__LLM_EOF__"
          extract display_name
          echo "__LLM_EOF__"
          echo "summary<<__LLM_EOF__"
          extract summary
          echo "__LLM_EOF__"
          echo "details<<__LLM_EOF__"
          extract details
          echo "__LLM_EOF__"
          echo "cta<<__LLM_EOF__"
          extract cta
          echo "__LLM_EOF__"
          echo "diagnosis<<__LLM_EOF__"
          extract diagnosis
          echo "__LLM_EOF__"
          echo "fix<<__LLM_EOF__"
          extract fix
          echo "__LLM_EOF__"
        } >> "$GITHUB_OUTPUT"
