name: gravity-devops-agent — approve

# Reusable workflow: triggered by `pull_request_review` from a caller. When
# a review is submitted with state=approved, resolves whether the approver
# covers every affected path per CODEOWNERS, then (if eligible) dispatches
# the apply workflow with the saved plan artifacts from the most recent
# successful plan run.
#
# v0 (CI-bound) implementation. v1 maps to DevOpsBridge.handle_review_event()
# in src/gravity_agent/bridges/devops/.
#
# Why a separate workflow rather than inline in the caller:
#   - Reusable across portcos with the same approver-eligibility logic.
#   - Apply dispatch needs a workflow_dispatch endpoint; this workflow is
#     the one that calls devops-agent-apply.yml on behalf of the caller.
#   - Lifecycle event vocabulary (lifecycle.queued, infra.approval.granted,
#     etc.) lives here rather than scattered across portco infra.yml's.

on:
  workflow_call:
    inputs:
      apply-workflow-ref:
        description: "Workflow file path of the apply workflow to dispatch (e.g. '.github/workflows/devops-agent-apply.yml'). Required."
        required: true
        type: string
      stacks:
        description: "JSON array of {directory, stack_id, plan_artifact, plan_run_id, engine, destroy} objects, one per stack to apply. Required."
        required: true
        type: string
      affected-paths:
        description: "Newline-separated list of repo-relative paths the PR touches. Required for CODEOWNERS resolution."
        required: true
        type: string
      codeowners-path:
        description: "Override path to CODEOWNERS. Empty = auto-detect."
        required: false
        type: string
        default: ""
      auto-merge:
        description: "Forwarded to apply workflow."
        required: false
        type: boolean
        default: true
      destroy-confirmed:
        description: "Required when any stack has destroy=true."
        required: false
        type: boolean
        default: false
      runs-on:
        description: "Runner label."
        required: false
        type: string
        default: "ubuntu-latest"
    outputs:
      eligible:
        description: "true if the approver covers all affected paths."
        value: ${{ jobs.evaluate.outputs.eligible }}
      apply-dispatched:
        description: "true if the apply workflow was dispatched."
        value: ${{ jobs.evaluate.outputs.apply_dispatched }}

permissions:
  contents: read
  pull-requests: write
  actions: write    # needed to dispatch the apply workflow

jobs:
  evaluate:
    runs-on: ${{ inputs.runs-on }}
    outputs:
      eligible: ${{ steps.resolve.outputs.eligible }}
      apply_dispatched: ${{ steps.dispatch.outputs.dispatched }}
    steps:
      - name: Generate gravity-devops-agent token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GRAVITY_DEVOPS_AGENT_APP_ID }}
          private-key: ${{ secrets.GRAVITY_DEVOPS_AGENT_PRIVATE_KEY }}

      - name: Filter to approval events
        id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          REVIEW_STATE: ${{ github.event.review.state }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" != "pull_request_review" ]; then
            echo "::notice::Not a pull_request_review event ($EVENT_NAME); no-op."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # GitHub uses lowercase "approved" for review state; case-insensitive match.
          if [ "$(echo "$REVIEW_STATE" | tr '[:upper:]' '[:lower:]')" != "approved" ]; then
            echo "::notice::Review state is '$REVIEW_STATE', not 'approved'; no-op."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "proceed=true" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.filter.outputs.proceed == 'true'
        uses: actions/checkout@v6

      - name: Resolve approver eligibility
        if: steps.filter.outputs.proceed == 'true'
        id: resolve
        uses: infinity-constellation/ci-workflows/.github/actions/devops-agent-resolve-approver@main
        with:
          approver-login: ${{ github.event.review.user.login }}
          affected-paths: ${{ inputs.affected-paths }}
          codeowners-path: ${{ inputs.codeowners-path }}
          github-token: ${{ steps.app-token.outputs.token }}

      - name: Enrich with LLM
        id: llm
        if: steps.filter.outputs.proceed == 'true'
        uses: infinity-constellation/ci-workflows/.github/actions/llm-comment@main
        with:
          event-type: ${{ steps.resolve.outputs.eligible == 'true' && 'apply-queued' || 'ineligible-approval' }}
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          context-json: >-
            {
              "approver": "${{ github.event.review.user.login }}",
              "eligible": ${{ steps.resolve.outputs.eligible == 'true' }},
              "reason": ${{ toJSON(steps.resolve.outputs.reason) }},
              "covering_owners": ${{ steps.resolve.outputs.covering-owners || '[]' }},
              "unowned_paths": ${{ steps.resolve.outputs.unowned-paths || '[]' }},
              "stacks": ${{ inputs.stacks }}
            }

      - name: Comment ineligible approval
        if: steps.filter.outputs.proceed == 'true' && steps.resolve.outputs.eligible != 'true'
        uses: actions/github-script@v9
        env:
          REASON: ${{ steps.resolve.outputs.reason }}
          COVERING: ${{ steps.resolve.outputs.covering-owners }}
          UNOWNED: ${{ steps.resolve.outputs.unowned-paths }}
          APPROVER: ${{ github.event.review.user.login }}
          LLM_SUMMARY: ${{ steps.llm.outputs.summary }}
          LLM_CTA: ${{ steps.llm.outputs.cta }}
          LLM_DIAGNOSIS: ${{ steps.llm.outputs.diagnosis }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const marker   = `<!-- devops-agent-approval-${process.env.APPROVER} -->`;
            const reason   = process.env.REASON;
            const covering = JSON.parse(process.env.COVERING || '[]');
            const unowned  = JSON.parse(process.env.UNOWNED  || '[]');
            const llmSummary   = process.env.LLM_SUMMARY   || '';
            const llmCta       = process.env.LLM_CTA       || '';
            const llmDiagnosis = process.env.LLM_DIAGNOSIS || '';

            const lines = [
              marker,
              `#### Approval insufficient — @${process.env.APPROVER}`,
              '',
              llmDiagnosis || reason,
            ];
            if (!llmDiagnosis) {
              if (unowned.length > 0) {
                lines.push('', '**Paths with no CODEOWNERS entry** (add ownership to unblock):');
                for (const p of unowned) lines.push(`- \`${p}\``);
              } else if (covering.length > 0) {
                lines.push('', '**Any one of these owners can approve:**');
                for (const o of covering) lines.push(`- ${o}`);
              }
            }
            if (llmSummary) { lines.push('', llmSummary); }
            lines.push('', llmCta
              ? `> ${llmCta}`
              : '_Approval recorded by GitHub but apply was not triggered._');

            const body = lines.join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Dispatch apply
        if: steps.filter.outputs.proceed == 'true' && steps.resolve.outputs.eligible == 'true'
        id: dispatch
        env:
          APPLY_REF: ${{ inputs.apply-workflow-ref }}
          STACKS_JSON: ${{ inputs.stacks }}
          AUTO_MERGE: ${{ inputs.auto-merge }}
          DESTROY_CONFIRMED: ${{ inputs.destroy-confirmed }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
          APPROVER_LOGIN: ${{ github.event.review.user.login }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          # Dispatch the apply workflow on the same repo. We pass inputs as
          # JSON to avoid GH Actions input-size limits on long string args.
          INPUTS_JSON=$(jq -n \
            --argjson pr "$PR_NUMBER" \
            --arg head "$HEAD_SHA" \
            --argjson stacks "$STACKS_JSON" \
            --arg approver "$APPROVER_LOGIN" \
            --argjson auto_merge "$AUTO_MERGE" \
            --argjson destroy_confirmed "$DESTROY_CONFIRMED" \
            '{pr_number: $pr, head_sha: $head, stacks: ($stacks | tostring), approver_login: $approver, auto_merge: $auto_merge, destroy_confirmed: $destroy_confirmed}')

          # gh workflow run takes -f key=value; build args.
          ARGS=()
          for key in pr_number head_sha approver_login auto_merge destroy_confirmed; do
            VAL=$(echo "$INPUTS_JSON" | jq -r --arg k "$key" '.[$k]')
            ARGS+=(-f "$key=$VAL")
          done
          # Stacks is JSON-encoded as a string input.
          STACKS_STR=$(echo "$INPUTS_JSON" | jq -r '.stacks')
          ARGS+=(-f "stacks=$STACKS_STR")

          # Dispatch on the PR head BRANCH (not SHA). GitHub's workflow_dispatch
          # API requires a branch name or tag — a commit SHA is rejected with
          # "No ref found for: <sha>". HEAD_SHA is still passed as an input so
          # the apply workflow can validate it hasn't been superseded.
          gh workflow run "$APPLY_REF" \
            --repo "$REPO" \
            --ref "$HEAD_BRANCH" \
            "${ARGS[@]}"

          echo "Dispatched apply workflow for PR #$PR_NUMBER (head=$HEAD_SHA, approver=$APPROVER_LOGIN)"
          echo "dispatched=true" >> "$GITHUB_OUTPUT"

      - name: Comment apply queued
        if: steps.filter.outputs.proceed == 'true' && steps.dispatch.outputs.dispatched == 'true'
        uses: actions/github-script@v9
        env:
          LLM_DISPLAY_NAME: ${{ steps.llm.outputs.display_name }}
          LLM_SUMMARY: ${{ steps.llm.outputs.summary }}
          LLM_CTA: ${{ steps.llm.outputs.cta }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const marker     = `<!-- devops-agent-approval-${process.env.APPROVER} -->`;
            const llmDisplay = process.env.LLM_DISPLAY_NAME || '';
            const llmSummary = process.env.LLM_SUMMARY      || '';
            const llmCta     = process.env.LLM_CTA          || 'Apply is running in dependency order. The PR will auto-merge on success.';

            const stacks = JSON.parse(process.env.STACKS_JSON || '[]').map(s => s.stack_id);
            function shortId(id) { return (id||'').split('-').slice(-3).join('-') || id; }

            const lines = [
              marker,
              llmDisplay
                ? `#### Apply queued — ${llmDisplay}`
                : `#### Apply queued — approved by @${process.env.APPROVER}`,
              '',
              `Approved by @${process.env.APPROVER}`,
              '',
              stacks.map(s => `- \`${shortId(s)}\``).join('\n'),
            ];
            if (llmSummary) { lines.push('', llmSummary); }
            lines.push('', `> ${llmCta}`);

            const body = lines.join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
