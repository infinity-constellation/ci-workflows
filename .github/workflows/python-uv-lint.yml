name: Python uv Lint

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version to install (e.g. 3.12)"
        required: false
        type: string
        default: "3.12"
      uv-version:
        description: "uv version to install (e.g. latest, 0.5.x)"
        required: false
        type: string
        default: "latest"
      working-directory:
        description: "Directory containing pyproject.toml"
        required: false
        type: string
        default: "."
      install-command:
        description: "Command used to install dependencies"
        required: false
        type: string
        default: "uv sync --all-extras --dev"
      ruff-check:
        description: "Run 'uv run ruff check'"
        required: false
        type: boolean
        default: true
      ruff-check-paths:
        description: "Paths passed to ruff check"
        required: false
        type: string
        default: "."
      ruff-format-check:
        description: "Run 'uv run ruff format --check'"
        required: false
        type: boolean
        default: false
      ruff-format-paths:
        description: "Paths passed to ruff format --check"
        required: false
        type: string
        default: "."
      black-check:
        description: "Run 'uv run black --check'"
        required: false
        type: boolean
        default: false
      black-paths:
        description: "Paths passed to black --check"
        required: false
        type: string
        default: "."
      mypy-check:
        description: "Run 'uv run mypy'"
        required: false
        type: boolean
        default: false
      mypy-paths:
        description: "Paths passed to mypy"
        required: false
        type: string
        default: "."
      runs-on:
        description: "Runner label"
        required: false
        type: string
        default: "ubuntu-latest"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ${{ inputs.runs-on }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ inputs.uv-version }}
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ inputs.python-version }}

      - name: Install dependencies
        run: ${{ inputs.install-command }}

      - name: Ruff check
        if: ${{ inputs.ruff-check }}
        run: uv run ruff check ${{ inputs.ruff-check-paths }}

      - name: Ruff format --check
        if: ${{ inputs.ruff-format-check }}
        run: uv run ruff format --check ${{ inputs.ruff-format-paths }}

      - name: Black --check
        if: ${{ inputs.black-check }}
        run: uv run black --check ${{ inputs.black-paths }}

      - name: Mypy
        if: ${{ inputs.mypy-check }}
        run: uv run mypy ${{ inputs.mypy-paths }}
