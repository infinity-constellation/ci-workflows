name: Python uv Lint

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version to install (e.g. 3.12)"
        required: false
        type: string
        default: "3.12"
      uv-version:
        description: "uv version to install (e.g. latest, 0.5.x)"
        required: false
        type: string
        default: "latest"
      working-directory:
        description: "Directory containing pyproject.toml"
        required: false
        type: string
        default: "."
      cache-dependency-glob:
        description: "Glob passed to astral-sh/setup-uv to scope its cache key"
        required: false
        type: string
        default: "**/uv.lock"
      install-command:
        description: "Command used to install dependencies"
        required: false
        type: string
        default: "uv sync --all-extras --dev"
      pre-lint-command:
        description: "Optional command run after install, before lint checks (codegen, schema validation, etc.)"
        required: false
        type: string
        default: ""
      post-lint-command:
        description: "Optional command run after lint checks (extra repo-specific validations)"
        required: false
        type: string
        default: ""
      extra-env:
        description: |
          Multi-line string of KEY=VALUE pairs (one per line) appended to
          $GITHUB_ENV before any user commands run. For non-secret config
          like CI flags, target environment names, or fake/test-only keys.
          Real secrets should be passed via the caller's secrets block on
          a wrapper job rather than via this input.
        required: false
        type: string
        default: ""
      ruff-check:
        description: "Run 'uv run ruff check'"
        required: false
        type: boolean
        default: true
      ruff-check-paths:
        description: "Paths passed to ruff check"
        required: false
        type: string
        default: "."
      ruff-format-check:
        description: "Run 'uv run ruff format --check'"
        required: false
        type: boolean
        default: false
      ruff-format-paths:
        description: "Paths passed to ruff format --check"
        required: false
        type: string
        default: "."
      black-check:
        description: "Run 'uv run black --check'"
        required: false
        type: boolean
        default: false
      black-paths:
        description: "Paths passed to black --check"
        required: false
        type: string
        default: "."
      mypy-check:
        description: "Run 'uv run mypy'"
        required: false
        type: boolean
        default: false
      mypy-paths:
        description: "Paths passed to mypy"
        required: false
        type: string
        default: "."
      basedpyright-check:
        description: "Run 'uv run basedpyright'"
        required: false
        type: boolean
        default: false
      basedpyright-paths:
        description: "Paths passed to basedpyright"
        required: false
        type: string
        default: "."
      runs-on:
        description: "Runner label"
        required: false
        type: string
        default: "ubuntu-latest"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ${{ inputs.runs-on }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ inputs.uv-version }}
          enable-cache: true
          cache-dependency-glob: ${{ inputs.cache-dependency-glob }}

      - name: Set up Python
        run: uv python install ${{ inputs.python-version }}

      - name: Export extra env
        if: ${{ inputs.extra-env != '' }}
        env:
          EXTRA_ENV: ${{ inputs.extra-env }}
        run: |
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            case "$line" in \#*) continue ;; esac
            printf '%s\n' "$line" >> "$GITHUB_ENV"
          done <<< "$EXTRA_ENV"

      - name: Install dependencies
        run: ${{ inputs.install-command }}

      - name: Pre-lint command
        if: ${{ inputs.pre-lint-command != '' }}
        run: ${{ inputs.pre-lint-command }}

      - name: Ruff check
        if: ${{ inputs.ruff-check }}
        run: uv run ruff check ${{ inputs.ruff-check-paths }}

      - name: Ruff format --check
        if: ${{ inputs.ruff-format-check }}
        run: uv run ruff format --check ${{ inputs.ruff-format-paths }}

      - name: Black --check
        if: ${{ inputs.black-check }}
        run: uv run black --check ${{ inputs.black-paths }}

      - name: Mypy
        if: ${{ inputs.mypy-check }}
        run: uv run mypy ${{ inputs.mypy-paths }}

      - name: Basedpyright
        if: ${{ inputs.basedpyright-check }}
        run: uv run basedpyright ${{ inputs.basedpyright-paths }}

      - name: Post-lint command
        if: ${{ inputs.post-lint-command != '' }}
        run: ${{ inputs.post-lint-command }}
