name: gravity-devops-agent — apply

# Reusable workflow: applies the saved plans for a set of stacks in
# Terragrunt-dependency-graph topological order. On success, enables
# auto-merge on the PR using a configurable strategy priority
# (default: squash > rebase > merge), with a structured trailer block.
# On failure, dispatches the postmortem workflow.
#
# v0 (CI-bound) implementation. v1 maps to DevOpsBridge.run_apply_task() in
# src/gravity_agent/bridges/devops/.
#
# Trigger: workflow_dispatch (called by devops-agent-approve.yml after a
# CODEOWNERS-eligible review approval). Pre-merge: applies against the PR
# head SHA, NOT against main, so the applied diff is exactly what was
# reviewed.
#
# Why one job, not a matrix:
#   Matrix legs are independent runners that don't share working directories
#   and can race on shared state (DynamoDB locks). Multi-stack apply must
#   honor Terragrunt's `dependency {}` graph to be correct. Therefore one
#   job that walks `terragrunt graph-dependencies`, applies each stack's
#   saved plan in topo order, and emits per-stack lifecycle events.

on:
  workflow_call:
    inputs:
      pr-number:
        description: "Pull request number to operate on. Required."
        required: true
        type: number
      head-sha:
        description: "SHA of the PR head this apply was authorized against. Required (so we refuse if the PR has new commits)."
        required: true
        type: string
      stacks:
        description: "JSON array of {directory, stack_id, plan_artifact, plan_run_id, engine, destroy} objects, one per stack to apply."
        required: true
        type: string
      approver-login:
        description: "Login of the user whose approval triggered this apply (for audit trail)."
        required: true
        type: string
      terraform-version:
        description: "Terraform version. Defaults to the canonical version in setup-iac-tools. Override only for testing upgrades."
        required: false
        type: string
        default: ""
      terragrunt-version:
        description: "Terragrunt version. Defaults to the canonical version in setup-iac-tools. Override only for testing upgrades."
        required: false
        type: string
        default: ""
      aws-role-to-assume:
        description: "ARN of the AWS role to assume via OIDC. Defaults to vars.AWS_TF_APPLY_ROLE_TO_ASSUME, then vars.AWS_TF_ROLE_TO_ASSUME."
        required: false
        type: string
        default: ""
      aws-region:
        description: "AWS region. Defaults to vars.AWS_REGION, then us-east-2."
        required: false
        type: string
        default: ""
      destroy-confirmed:
        description: "Must be true if any stack has destroy=true."
        required: false
        type: boolean
        default: false
      auto-merge:
        description: "When true (default), enables auto-merge on the PR after a successful apply. Method is selected from the merge-strategy priority list."
        required: false
        type: boolean
        default: true
      merge-strategy:
        description: |
          Merge strategy preference. Empty (default) means use the default priority
          `squash > rebase > merge`. Explicit values: 'squash' | 'rebase' | 'merge'
          select that method as highest priority. The agent walks the priority list
          and picks the first method allowed by the repo. If a method is rejected
          by GitHub at apply time (e.g. the repo silently disabled it after this
          run started), the agent retries with the next-priority method.

          Resolution order: this input > vars.DEVOPS_AGENT_MERGE_STRATEGY > default
          priority `squash > rebase > merge`.
        required: false
        type: string
        default: ""
      runs-on:
        description: "Runner label."
        required: false
        type: string
        default: "ubuntu-latest"

permissions:
  contents: write           # apply produces commits/tags via auto-merge
  id-token: write           # OIDC
  pull-requests: write      # comment + auto-merge
  actions: read             # fetch artifacts from prior runs

# Per-PR concurrency: only one apply at a time per PR. New approvals while
# an apply is running queue behind the current one.
concurrency:
  group: devops-agent-apply-${{ github.repository }}-pr-${{ inputs.pr-number }}
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ${{ inputs.runs-on }}
    outputs:
      outcome: ${{ steps.summarize.outputs.outcome }}
      applied-stacks: ${{ steps.summarize.outputs.applied_stacks }}
      failed-stack: ${{ steps.summarize.outputs.failed_stack }}
    steps:
      - name: Resolve configuration
        id: resolve
        env:
          INPUT_AWS_REGION: ${{ inputs.aws-region }}
          INPUT_AWS_ROLE_TO_ASSUME: ${{ inputs.aws-role-to-assume }}
          VAR_AWS_REGION: ${{ vars.AWS_REGION }}
          VAR_AWS_TF_APPLY_ROLE: ${{ vars.AWS_TF_APPLY_ROLE_TO_ASSUME }}
          VAR_AWS_TF_ROLE: ${{ vars.AWS_TF_ROLE_TO_ASSUME }}
          STACKS_JSON: ${{ inputs.stacks }}
          DESTROY_CONFIRMED: ${{ inputs.destroy-confirmed }}
        run: |
          set -euo pipefail

          AWS_REGION="${INPUT_AWS_REGION:-${VAR_AWS_REGION:-us-east-2}}"
          AWS_ROLE_TO_ASSUME="${INPUT_AWS_ROLE_TO_ASSUME:-${VAR_AWS_TF_APPLY_ROLE:-${VAR_AWS_TF_ROLE:-}}}"

          if [ -z "$AWS_ROLE_TO_ASSUME" ]; then
            # Apply has no bootstrap-skip semantics: if we got here without a
            # role, something is wrong (the plan workflow should have already
            # exited in bootstrap mode and the approve workflow should not
            # have dispatched apply). Surface clearly.
            echo "::error::Missing AWS apply role. Set input aws-role-to-assume or vars AWS_TF_APPLY_ROLE_TO_ASSUME / AWS_TF_ROLE_TO_ASSUME. Note: if AWS_TF_ROLE_TO_ASSUME is also unset, the plan workflow runs in bootstrap mode and apply should not have been dispatched."
            exit 1
          fi

          # Validate stacks JSON.
          if ! echo "$STACKS_JSON" | jq -e 'type == "array" and length > 0' > /dev/null; then
            echo "::error::stacks input must be a non-empty JSON array."
            exit 1
          fi

          # If any stack is destroy=true, destroy-confirmed must be true.
          ANY_DESTROY=$(echo "$STACKS_JSON" | jq -r 'any(.destroy == true)')
          if [ "$ANY_DESTROY" = "true" ] && [ "$DESTROY_CONFIRMED" != "true" ]; then
            echo "::error::At least one stack has destroy=true but destroy-confirmed=false. Refusing."
            exit 1
          fi

          {
            echo "aws_region=$AWS_REGION"
            echo "aws_role_to_assume=$AWS_ROLE_TO_ASSUME"
            echo "stack_count=$(echo "$STACKS_JSON" | jq 'length')"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.head-sha }}
          fetch-depth: 1

      - name: Verify head SHA matches PR head
        env:
          PR_NUMBER: ${{ inputs.pr-number }}
          EXPECTED_SHA: ${{ inputs.head-sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ACTUAL_SHA=$(gh pr view "$PR_NUMBER" --json headRefOid --jq .headRefOid \
            --repo "$GITHUB_REPOSITORY")
          if [ "$ACTUAL_SHA" != "$EXPECTED_SHA" ]; then
            echo "::error::PR #$PR_NUMBER head is now $ACTUAL_SHA but apply was authorized against $EXPECTED_SHA. New commits invalidate prior approvals; refusing."
            exit 1
          fi
          echo "Confirmed apply against authorized head $EXPECTED_SHA"

      - name: Set up IaC tools
        uses: infinity-constellation/ci-workflows/.github/actions/setup-iac-tools@main
        with:
          terraform-version: ${{ inputs.terraform-version }}
          terragrunt-version: ${{ inputs.terragrunt-version }}

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ steps.resolve.outputs.aws_role_to_assume }}
          aws-region: ${{ steps.resolve.outputs.aws_region }}
          role-session-name: devops-agent-apply-pr${{ inputs.pr-number }}-${{ github.run_id }}

      - name: Download saved plans
        env:
          STACKS_JSON: ${{ inputs.stacks }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/plans"

          # Each stack: download its plan-artifact from the recorded run.
          echo "$STACKS_JSON" | jq -c '.[]' | while read -r stack; do
            STACK_ID=$(echo "$stack" | jq -r '.stack_id')
            ARTIFACT=$(echo "$stack" | jq -r '.plan_artifact')
            RUN_ID=$(echo "$stack" | jq -r '.plan_run_id')
            DEST="$RUNNER_TEMP/plans/$STACK_ID"
            mkdir -p "$DEST"
            echo "Downloading $ARTIFACT from run $RUN_ID into $DEST"
            gh run download "$RUN_ID" --repo "$REPO" --name "$ARTIFACT" --dir "$DEST"
            # Sanity check.
            for f in plan.bin plan.json plan.txt metadata.json; do
              if [ ! -f "$DEST/$f" ]; then
                echo "::error::Artifact $ARTIFACT missing $f"
                exit 1
              fi
            done
            # Engine check: metadata must match the input.
            META_ENGINE=$(jq -r .engine "$DEST/metadata.json")
            INPUT_ENGINE=$(echo "$stack" | jq -r '.engine')
            if [ "$META_ENGINE" != "$INPUT_ENGINE" ]; then
              echo "::error::Engine mismatch for $STACK_ID: artifact says $META_ENGINE, input says $INPUT_ENGINE"
              exit 1
            fi
          done

      - name: Compute apply order (Terragrunt graph-dependencies)
        id: order
        env:
          STACKS_JSON: ${{ inputs.stacks }}
        run: |
          set -euo pipefail

          # For each Terragrunt stack, run `terragrunt graph-dependencies`
          # from its directory to capture which directories it depends on.
          # Then topologically sort the union of those edges restricted to
          # stacks present in our input set.
          #
          # For raw Terraform stacks (no Terragrunt deps), order them after
          # Terragrunt deps in input order — typical case is one or the
          # other, not mixed; if mixed, raw TF stacks are independent.

          mkdir -p "$RUNNER_TEMP/graph"
          INPUT_DIRS=$(echo "$STACKS_JSON" | jq -r '.[].directory')

          # Build a dependency edge list: "child<TAB>parent" where child
          # depends on parent.
          : > "$RUNNER_TEMP/graph/edges.txt"
          for dir in $INPUT_DIRS; do
            ENGINE=$(echo "$STACKS_JSON" | jq -r --arg d "$dir" '.[] | select(.directory == $d) | .engine')
            if [ "$ENGINE" = "terragrunt" ]; then
              # `terragrunt graph-dependencies` output format:
              #   digraph {
              #     "/abs/path/child" ;
              #     "/abs/path/child" -> "/abs/path/parent" ;
              #   }
              GRAPH=$(cd "$dir" && terragrunt graph-dependencies --non-interactive 2>/dev/null || true)
              echo "$GRAPH" \
                | grep -E '"\s*->\s*"' \
                | sed -E 's/^\s*"([^"]+)"\s*->\s*"([^"]+)"\s*;\s*$/\1\t\2/' \
                >> "$RUNNER_TEMP/graph/edges.txt" || true
            fi
          done

          # Convert absolute paths in edges to repo-relative input dirs (only
          # keep edges where both endpoints are in our input set).
          REPO_ROOT=$(pwd)
          python3 - "$RUNNER_TEMP/graph/edges.txt" "$REPO_ROOT" <<'PY' > "$RUNNER_TEMP/graph/order.txt"
          import json
          import os
          import sys
          from collections import defaultdict, deque

          edges_file = sys.argv[1]
          repo_root = os.path.abspath(sys.argv[2])
          stacks = json.loads(os.environ["STACKS_JSON"])
          input_dirs = [s["directory"] for s in stacks]
          input_set = set(input_dirs)

          def to_rel(p: str) -> str:
              ap = os.path.abspath(p)
              if ap.startswith(repo_root + os.sep):
                  return os.path.relpath(ap, repo_root)
              return p  # fallback; will not match input_set

          # Edges: child depends on parent → parent must apply first.
          deps = defaultdict(set)  # node -> set(parents in input_set)
          all_nodes = set(input_dirs)
          with open(edges_file) as f:
              for line in f:
                  parts = line.strip().split("\t")
                  if len(parts) != 2:
                      continue
                  child, parent = to_rel(parts[0]), to_rel(parts[1])
                  if child in input_set and parent in input_set:
                      deps[child].add(parent)
                      all_nodes.add(child)
                      all_nodes.add(parent)

          # Kahn's algorithm; ties broken by input order.
          input_order = {d: i for i, d in enumerate(input_dirs)}
          indegree = {n: len(deps[n]) for n in all_nodes}
          ready = sorted([n for n, d in indegree.items() if d == 0],
                         key=lambda n: input_order.get(n, 1_000_000))
          ordered = []
          # Reverse adjacency.
          rev = defaultdict(set)
          for child, parents in deps.items():
              for p in parents:
                  rev[p].add(child)

          while ready:
              n = ready.pop(0)
              ordered.append(n)
              for child in sorted(rev[n], key=lambda c: input_order.get(c, 1_000_000)):
                  indegree[child] -= 1
                  if indegree[child] == 0:
                      ready.append(child)
              ready.sort(key=lambda c: input_order.get(c, 1_000_000))

          if len(ordered) != len(all_nodes):
              # Cycle detected — fall back to input order with a warning.
              print("::warning::Dependency cycle detected; falling back to input order.", file=sys.stderr)
              for d in input_dirs:
                  if d not in ordered:
                      ordered.append(d)

          for d in ordered:
              print(d)
          PY

          echo "Apply order:"
          cat "$RUNNER_TEMP/graph/order.txt"
          {
            echo "order_file=$RUNNER_TEMP/graph/order.txt"
          } >> "$GITHUB_OUTPUT"

      - name: Apply in topological order
        id: apply
        env:
          STACKS_JSON: ${{ inputs.stacks }}
          ORDER_FILE: ${{ steps.order.outputs.order_file }}
          PR_NUMBER: ${{ inputs.pr-number }}
          APPROVER_LOGIN: ${{ inputs.approver-login }}
        run: |
          set -euo pipefail

          mkdir -p "$RUNNER_TEMP/apply-logs"
          APPLIED=()
          FAILED_STACK=""
          FAILED_LOG=""

          # Engine-agnostic invoker. Routes the requested verb to the right
          # binary with the right wrapper flags. See devops-agent-plan.yml
          # for full rationale (in short: terragrunt-mode show/apply must
          # delegate via terragrunt so the working directory is the cached
          # module dir where `.terraform/providers/` lives). Exported so
          # the per-stack `(cd "$DIR" ...)` subshells below inherit it.
          tf() {
            local verb="$1"; shift
            if [ "$ENGINE" = "terragrunt" ]; then
              terragrunt "$verb" --non-interactive "$@"
            else
              case "$verb" in
                init) terraform init -input=false "$@" ;;
                *)    terraform "$verb" "$@" ;;
              esac
            fi
          }
          export -f tf

          while IFS= read -r DIR; do
            [ -z "$DIR" ] && continue
            STACK=$(echo "$STACKS_JSON" | jq -c --arg d "$DIR" '.[] | select(.directory == $d)')
            STACK_ID=$(echo "$STACK" | jq -r '.stack_id')
            ENGINE=$(echo "$STACK" | jq -r '.engine')
            DESTROY=$(echo "$STACK" | jq -r '.destroy')
            PLAN_DIR="$RUNNER_TEMP/plans/$STACK_ID"
            LOG="$RUNNER_TEMP/apply-logs/$STACK_ID.log"

            # Re-export ENGINE for the subshells below (each iteration may
            # apply a stack with a different engine).
            export ENGINE

            echo ""
            echo "============================================================"
            echo " applying: $STACK_ID  ($DIR, engine=$ENGINE, destroy=$DESTROY)"
            echo "============================================================"

            # Init in the working directory (state backend may need to
            # initialize fresh on this runner).
            (
              cd "$DIR"
              tf init -reconfigure
            )

            # Apply the saved plan. Fail fast on error and capture log.
            set +e
            (
              cd "$DIR"
              tf apply -input=false -no-color "$PLAN_DIR/plan.bin"
            ) 2>&1 | tee "$LOG"
            APPLY_EXIT=${PIPESTATUS[0]}
            set -e

            if [ "$APPLY_EXIT" -ne 0 ]; then
              FAILED_STACK="$STACK_ID"
              FAILED_LOG="$LOG"
              echo "::error::apply failed for $STACK_ID (exit=$APPLY_EXIT)"
              break
            fi
            APPLIED+=("$STACK_ID")
          done < "$ORDER_FILE"

          {
            echo "applied=$(printf '%s\n' "${APPLIED[@]}" | jq -R -s -c 'split("\n") | map(select(length > 0))')"
            echo "failed_stack=$FAILED_STACK"
            echo "failed_log=$FAILED_LOG"
          } >> "$GITHUB_OUTPUT"

          if [ -n "$FAILED_STACK" ]; then
            exit 1
          fi

      - name: Summarize apply
        id: summarize
        if: ${{ always() }}
        env:
          STACKS_JSON: ${{ inputs.stacks }}
          APPLIED_JSON: ${{ steps.apply.outputs.applied }}
          FAILED_STACK: ${{ steps.apply.outputs.failed_stack }}
          PR_NUMBER: ${{ inputs.pr-number }}
          APPROVER_LOGIN: ${{ inputs.approver-login }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail

          OUTCOME="success"
          if [ "$JOB_STATUS" != "success" ] || [ -n "$FAILED_STACK" ]; then
            OUTCOME="failure"
          fi

          {
            echo "outcome=$OUTCOME"
            echo "applied_stacks=$APPLIED_JSON"
            echo "failed_stack=$FAILED_STACK"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## DevOps Agent — Apply outcome: $OUTCOME"
            echo ""
            echo "**PR**: #$PR_NUMBER  **Approver**: @$APPROVER_LOGIN"
            echo ""
            echo "**Stacks applied** (in order):"
            echo "$APPLIED_JSON" | jq -r '.[] | "- ✅ \(.)"'
            if [ -n "$FAILED_STACK" ]; then
              echo ""
              echo "**Failed stack**: \`$FAILED_STACK\`"
              REMAINING=$(echo "$STACKS_JSON" | jq -r --argjson applied "$APPLIED_JSON" --arg failed "$FAILED_STACK" '
                .[] | select((.stack_id as $s | $applied | index($s) | not) and (.stack_id != $failed)) | .stack_id')
              if [ -n "$REMAINING" ]; then
                echo ""
                echo "**Skipped (downstream of failure)**:"
                while IFS= read -r line; do
                  [ -z "$line" ] && continue
                  echo "- ⏭️ $line"
                done <<< "$REMAINING"
              fi
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment apply outcome on PR
        if: ${{ always() }}
        uses: actions/github-script@v9
        env:
          OUTCOME: ${{ steps.summarize.outputs.outcome }}
          APPLIED_JSON: ${{ steps.summarize.outputs.applied_stacks }}
          FAILED_STACK: ${{ steps.summarize.outputs.failed_stack }}
          STACKS_JSON: ${{ inputs.stacks }}
          PR_NUMBER: ${{ inputs.pr-number }}
          APPROVER_LOGIN: ${{ inputs.approver-login }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const marker = `<!-- devops-agent-apply -->`;
            const applied = JSON.parse(process.env.APPLIED_JSON || '[]');
            const stacks = JSON.parse(process.env.STACKS_JSON || '[]');
            const failed = process.env.FAILED_STACK;
            const outcome = process.env.OUTCOME;

            const appliedList = applied.map(s => `- ✅ \`${s}\``).join('\n') || '_none_';
            const skipped = stacks
              .map(s => s.stack_id)
              .filter(id => !applied.includes(id) && id !== failed);
            const skippedList = skipped.length > 0 ? skipped.map(s => `- ⏭️ \`${s}\``).join('\n') : '';

            const lines = [
              marker,
              outcome === 'success'
                ? `### gravity-devops-agent — Apply succeeded ✅`
                : `### gravity-devops-agent — Apply FAILED ❌`,
              '',
              `Approver: @${process.env.APPROVER_LOGIN}  ·  [workflow run](${process.env.RUN_URL})`,
              '',
              `**Applied:**`,
              appliedList,
            ];
            if (failed) {
              lines.push('', `**Failed stack:** \`${failed}\``);
            }
            if (skippedList) {
              lines.push('', `**Skipped (downstream of failure):**`, skippedList);
            }
            if (outcome === 'success') {
              lines.push('', `Auto-merge will engage once branch protection requirements are satisfied.`);
            } else {
              lines.push('', `Approvals will be dismissed and a postmortem comment posted shortly.`);
            }

            const body = lines.join('\n');
            const { owner, repo } = context.repo;
            const issue_number = parseInt(process.env.PR_NUMBER, 10);

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find(c =>
              c.user && c.user.type === 'Bot' && c.body && c.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Enable auto-merge on success
        if: ${{ inputs.auto-merge && steps.summarize.outputs.outcome == 'success' }}
        env:
          PR_NUMBER: ${{ inputs.pr-number }}
          REPO: ${{ github.repository }}
          APPLIED_JSON: ${{ steps.summarize.outputs.applied_stacks }}
          APPROVER_LOGIN: ${{ inputs.approver-login }}
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          INPUT_MERGE_STRATEGY: ${{ inputs.merge-strategy }}
          VAR_MERGE_STRATEGY: ${{ vars.DEVOPS_AGENT_MERGE_STRATEGY }}
        run: |
          set -euo pipefail

          # Build the structured trailer block recorded on the merge commit
          # (squash) or last commit (rebase) or merge commit (merge).
          APPLIED_LINES=$(echo "$APPLIED_JSON" | jq -r '.[]')
          APPLIED_LIST="${APPLIED_LINES//$'\n'/$'\n'  - }"
          APPLIED_LIST="  - ${APPLIED_LIST}"
          BODY=$(cat <<EOF
          DevOps-Agent-Apply: success
          DevOps-Agent-Approver: @$APPROVER_LOGIN
          DevOps-Agent-Run: $RUN_URL
          DevOps-Agent-Applied:
          $APPLIED_LIST
          EOF
          )

          # ----------------------------------------------------------------
          # Resolve which merge methods are allowed by the repo.
          # ----------------------------------------------------------------
          # GitHub returns `allow_squash_merge`, `allow_rebase_merge`,
          # `allow_merge_commit` on the repo object. The agent walks the
          # priority list and picks the first method allowed.
          REPO_INFO=$(gh api "repos/$REPO" --jq '{squash: .allow_squash_merge, rebase: .allow_rebase_merge, merge: .allow_merge_commit}')
          ALLOW_SQUASH=$(echo "$REPO_INFO" | jq -r '.squash')
          ALLOW_REBASE=$(echo "$REPO_INFO" | jq -r '.rebase')
          ALLOW_MERGE=$(echo "$REPO_INFO" | jq -r '.merge')
          echo "Repo merge methods: squash=$ALLOW_SQUASH rebase=$ALLOW_REBASE merge=$ALLOW_MERGE"

          # ----------------------------------------------------------------
          # Build the priority list.
          # ----------------------------------------------------------------
          # Resolution order: workflow input > repo var > default.
          # Default priority: squash > rebase > merge.
          # An explicit choice (input or var) puts that method first; the
          # remaining methods follow in default order so we still have
          # fallbacks if the chosen method is rejected at apply time.
          STRATEGY="${INPUT_MERGE_STRATEGY:-${VAR_MERGE_STRATEGY:-}}"

          case "$STRATEGY" in
            squash) PRIORITY=("squash" "rebase" "merge") ;;
            rebase) PRIORITY=("rebase" "squash" "merge") ;;
            merge)  PRIORITY=("merge" "squash" "rebase") ;;
            "")     PRIORITY=("squash" "rebase" "merge") ;;
            *)
              echo "::error::Invalid merge-strategy '$STRATEGY'. Must be one of: squash, rebase, merge, or empty for default."
              exit 1
              ;;
          esac

          # Filter the priority list to methods the repo actually allows.
          ATTEMPT_LIST=()
          for method in "${PRIORITY[@]}"; do
            case "$method" in
              squash) [ "$ALLOW_SQUASH" = "true" ] && ATTEMPT_LIST+=("squash") ;;
              rebase) [ "$ALLOW_REBASE" = "true" ] && ATTEMPT_LIST+=("rebase") ;;
              merge)  [ "$ALLOW_MERGE"  = "true" ] && ATTEMPT_LIST+=("merge")  ;;
            esac
          done

          if [ "${#ATTEMPT_LIST[@]}" -eq 0 ]; then
            echo "::error::No merge methods allowed on $REPO. The agent cannot auto-merge. Enable at least one of squash/rebase/merge in repo settings."
            exit 1
          fi

          echo "Auto-merge attempt order: ${ATTEMPT_LIST[*]}"
          if [ -n "$STRATEGY" ]; then
            echo "  (preferred='$STRATEGY' — workflow input or DEVOPS_AGENT_MERGE_STRATEGY repo var)"
          fi

          # ----------------------------------------------------------------
          # Walk the priority list, retrying with the next method on each
          # failure. Apply has already succeeded; we are committing the PR
          # to main, so we should not give up on auto-merge until every
          # allowed method has been tried.
          # ----------------------------------------------------------------
          MERGE_OK=false
          MERGE_METHOD=""
          MERGE_ERROR=""
          for method in "${ATTEMPT_LIST[@]}"; do
            echo "Attempting auto-merge with method=$method ..."
            # `gh pr merge --auto` enables auto-merge; GitHub completes the
            # merge once required checks/reviews pass.
            if OUTPUT=$(gh pr merge "$PR_NUMBER" \
                --repo "$REPO" \
                --auto \
                "--$method" \
                --body "$BODY" 2>&1); then
              MERGE_OK=true
              MERGE_METHOD="$method"
              echo "Auto-merge enabled via $method."
              break
            else
              MERGE_ERROR="$OUTPUT"
              echo "::warning::Auto-merge with method=$method failed: $OUTPUT"
            fi
          done

          {
            echo "merge_ok=$MERGE_OK"
            echo "merge_method=$MERGE_METHOD"
            echo "merge_error<<EOF"
            echo "$MERGE_ERROR"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [ "$MERGE_OK" != "true" ]; then
            # Apply has already succeeded — infra is changed. We do NOT
            # treat this as an apply failure (no postmortem dispatch, no
            # approval dismissal) because the PR is approved and the
            # change is live. Post a comment so the operator can manually
            # complete the merge.
            echo "::warning title=auto-merge failed::Apply succeeded; PR is approved and ready to merge but auto-merge could not engage. See PR comment for details."
          fi
        id: merge

      - name: Comment auto-merge failure on PR
        if: ${{ inputs.auto-merge && steps.summarize.outputs.outcome == 'success' && steps.merge.outputs.merge_ok != 'true' }}
        uses: actions/github-script@v9
        env:
          PR_NUMBER: ${{ inputs.pr-number }}
          MERGE_ERROR: ${{ steps.merge.outputs.merge_error }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const marker = `<!-- devops-agent-merge-failed -->`;
            const body = [
              marker,
              `### gravity-devops-agent — Auto-merge could not engage ⚠️`,
              '',
              `**Apply succeeded** — infrastructure is changed and reflects the reviewed plan. Approvals on this PR remain valid.`,
              '',
              `Auto-merge failed for every allowed method on this repo. Likely causes:`,
              '',
              `- The repo has no merge methods enabled (enable at least one of squash / rebase / merge in repo settings).`,
              `- The repo silently disabled the configured method between approval and merge.`,
              `- Branch protection requires a check that has not yet completed.`,
              '',
              `**Action:** merge this PR manually using whichever method your repo allows. The change is already applied; merging just records the PR in \`main\`. Then close out this notice.`,
              '',
              `<details><summary>Last error</summary>`,
              '',
              '```',
              process.env.MERGE_ERROR || '(no error captured)',
              '```',
              '',
              `</details>`,
              '',
              `[Workflow run](${process.env.RUN_URL})`,
            ].join('\n');

            const issue_number = parseInt(process.env.PR_NUMBER, 10);
            const { owner, repo } = context.repo;
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }


      - name: Dispatch postmortem on failure
        if: ${{ steps.summarize.outputs.outcome == 'failure' }}
        env:
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr-number }}
          STACKS_JSON: ${{ inputs.stacks }}
          APPLIED_JSON: ${{ steps.summarize.outputs.applied_stacks }}
          FAILED_STACK: ${{ steps.summarize.outputs.failed_stack }}
          APPROVER_LOGIN: ${{ inputs.approver-login }}
          APPLY_RUN_ID: ${{ github.run_id }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # The postmortem workflow path is conventional; callers that
          # rename it must override this dispatch in their own caller.
          POSTMORTEM_REF=".github/workflows/devops-agent-postmortem.yml"

          gh workflow run "$POSTMORTEM_REF" \
            --repo "$REPO" \
            --ref "$GITHUB_REF_NAME" \
            -f "pr_number=$PR_NUMBER" \
            -f "apply_run_id=$APPLY_RUN_ID" \
            -f "applied_stacks=$APPLIED_JSON" \
            -f "failed_stack=$FAILED_STACK" \
            -f "stacks=$STACKS_JSON" \
            -f "approver_login=$APPROVER_LOGIN"
          echo "Dispatched postmortem workflow for PR #$PR_NUMBER (failed=$FAILED_STACK)"
