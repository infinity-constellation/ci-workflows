name: gravity-devops-agent — respond

# Reusable workflow: called by a thin caller in each portco repo when
# someone addresses Gravity's DevOps Agent in a PR comment.
#
# Wake-words (case-insensitive, any of):
#   @gravity-devops-agent ...
#   @Gravity ...
#   Gravity, ...
#
# Supported interactions (intent detected by LLM, not keyword matching):
#   Gravity, what does this plan change?
#   @Gravity why did the apply fail?
#   @gravity-devops-agent is it safe to approve this?
#   @Gravity re-run the plan
#   Gravity, explain <anything about the PR>
#
# Caller: add a respond.yml to .github/workflows/ with:
#   on:
#     issue_comment:
#       types: [created]
#   jobs:
#     respond:
#       if: |
#         github.event.issue.pull_request != null &&
#         github.event.issue.state == 'open' &&
#         github.event.comment.user.type != 'Bot' && (
#           contains(github.event.comment.body, '@gravity-devops-agent') ||
#           contains(github.event.comment.body, '@Gravity') ||
#           startsWith(github.event.comment.body, 'Gravity')
#         )
#       uses: infinity-constellation/ci-workflows/.github/workflows/devops-agent-respond.yml@main
#       secrets: inherit

on:
  workflow_call:
    inputs:
      pr-number:
        description: "PR number the comment was posted on."
        required: true
        type: number
      comment-body:
        description: "Body of the comment that triggered the workflow."
        required: true
        type: string
      comment-author:
        description: "GitHub login of the comment author."
        required: true
        type: string
      comment-id:
        description: "ID of the comment (for reactions)."
        required: true
        type: string
      repo:
        description: "Repository in owner/name format."
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: write   # needed to trigger re-plan workflow_dispatch

jobs:
  respond:
    # The caller's if: condition already filtered for valid wake-word comments
    # on open PRs from non-bot users. No duplicate filtering needed here since
    # github.event.* from the caller's issue_comment context is not reliably
    # available through workflow_call.
    runs-on: ubuntu-latest
    steps:
      - name: Generate gravity-devops-agent token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GRAVITY_DEVOPS_AGENT_APP_ID }}
          private-key: ${{ secrets.GRAVITY_DEVOPS_AGENT_PRIVATE_KEY }}

      - name: Gather PR context
        id: context
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ inputs.repo }}
          PR_NUMBER: ${{ inputs.pr-number }}
          COMMENT_BODY: ${{ inputs.comment-body }}
          COMMENT_AUTHOR: ${{ inputs.comment-author }}
        run: |
          set -euo pipefail

          # Strip the wake-word to get the raw question.
          # Handles: @gravity-devops-agent, @Gravity, Gravity,  (case-insensitive)
          QUESTION=$(echo "$COMMENT_BODY" \
            | sed -E 's/@gravity-devops-agent//gi' \
            | sed -E 's/@[Gg]ravity//g' \
            | sed -E 's/^[Gg]ravity[,:]?//g' \
            | xargs)
          echo "question<<__Q_EOF__"  >> "$GITHUB_OUTPUT"
          echo "$QUESTION"            >> "$GITHUB_OUTPUT"
          echo "__Q_EOF__"            >> "$GITHUB_OUTPUT"

          # Detect re-run intent (simple keyword match — LLM handles nuance).
          if echo "$QUESTION" | grep -qiE 're.?run|re.?plan|run again|replan|re plan'; then
            echo "wants_replan=true"  >> "$GITHUB_OUTPUT"
          else
            echo "wants_replan=false" >> "$GITHUB_OUTPUT"
          fi

          # Fetch PR metadata.
          PR_JSON=$(gh api "repos/$REPO/pulls/$PR_NUMBER" \
            --jq '{title: .title, head_ref: .head.ref, head_sha: .head.sha, author: .user.login, base: .base.ref}')
          echo "pr_json=$PR_JSON" >> "$GITHUB_OUTPUT"

          # Find the most recent successful plan run for this PR branch.
          HEAD_REF=$(echo "$PR_JSON" | jq -r '.head_ref')
          HEAD_SHA=$(echo "$PR_JSON" | jq -r '.head_sha')

          PLAN_RUN_ID=$(gh run list \
            --repo "$REPO" \
            --workflow infra.yml \
            --branch "$HEAD_REF" \
            --status success \
            --limit 3 \
            --json databaseId,headSha \
            --jq "[.[] | select(.headSha == \"$HEAD_SHA\")] | .[0].databaseId" 2>/dev/null || echo "")

          echo "plan_run_id=${PLAN_RUN_ID:-}" >> "$GITHUB_OUTPUT"

          # Collect plan comments already on the PR to give the LLM context.
          PLAN_COMMENTS=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq '[.[] | select(.user.type == "Bot" and (.body | contains("devops-agent-plan:"))) | {body: .body[:3000]}] | .[:5]' \
            2>/dev/null || echo '[]')
          echo "plan_comments<<__PC_EOF__"  >> "$GITHUB_OUTPUT"
          echo "$PLAN_COMMENTS"             >> "$GITHUB_OUTPUT"
          echo "__PC_EOF__"                 >> "$GITHUB_OUTPUT"

      - name: Post thinking reaction
        id: reaction
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ inputs.repo }}
          COMMENT_ID: ${{ inputs.comment-id }}
        run: |
          # Add 👀 to signal we received the message and are processing.
          # Store the reaction ID so we can delete it cleanly after responding.
          REACTION=$(gh api "repos/$REPO/issues/comments/$COMMENT_ID/reactions" \
            --method POST \
            --field content="eyes" 2>/dev/null || echo "{}")
          REACTION_ID=$(echo "$REACTION" | jq -r '.id // ""')
          echo "reaction_id=$REACTION_ID" >> "$GITHUB_OUTPUT"

      - name: Trigger re-plan if requested
        if: steps.context.outputs.wants_replan == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ inputs.repo }}
          HEAD_REF: ${{ fromJson(steps.context.outputs.pr_json).head_ref }}
        run: |
          set -euo pipefail
          gh workflow run infra.yml \
            --repo "$REPO" \
            --ref "$HEAD_REF" \
            2>&1 && echo "Re-plan triggered on $HEAD_REF" || true

      - name: Call LLM for response
        id: llm
        uses: infinity-constellation/ci-workflows/.github/actions/llm-comment@main
        with:
          event-type: comment-question
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          context-json: >-
            {
              "question": ${{ toJSON(steps.context.outputs.question) }},
              "pr_context": ${{ steps.context.outputs.pr_json }},
              "comment_author": "${{ inputs.comment-author }}",
              "wants_replan": ${{ steps.context.outputs.wants_replan }},
              "plan_comments": ${{ steps.context.outputs.plan_comments }}
            }

      - name: Post response comment
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ inputs.repo }}
          PR_NUMBER: ${{ inputs.pr-number }}
          COMMENT_AUTHOR: ${{ inputs.comment-author }}
          WANTS_REPLAN: ${{ steps.context.outputs.wants_replan }}
          LLM_DIAGNOSIS: ${{ steps.llm.outputs.diagnosis }}
          LLM_DETAILS: ${{ steps.llm.outputs.details }}
          LLM_SUMMARY: ${{ steps.llm.outputs.summary }}
          LLM_FIX: ${{ steps.llm.outputs.fix }}
          LLM_DISPLAY: ${{ steps.llm.outputs.display_name }}
        run: |
          set -euo pipefail

          # comment-question answers go in 'details'. Fall back to summary then diagnosis.
          RESPONSE="${LLM_DETAILS:-${LLM_SUMMARY:-${LLM_DIAGNOSIS:-}}}"
          if [ -n "$LLM_FIX" ]; then
            RESPONSE="${RESPONSE}"$'\n\n'"${LLM_FIX}"
          fi
          if [ -z "$RESPONSE" ]; then
            RESPONSE="I wasn't able to generate a useful response for that question. Check the plan output in this PR or the workflow run logs for details."
          fi

          # Prepend replan notice if triggered.
          if [ "$WANTS_REPLAN" = "true" ]; then
            RESPONSE="Re-plan triggered on this branch — a new plan comment will appear shortly."$'\n\n'"${RESPONSE}"
          fi

          BODY="@${COMMENT_AUTHOR} ${RESPONSE}"

          # --raw-field treats the value as a literal string (not a filename)
          gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --method POST \
            --raw-field body="$BODY"

      - name: Remove thinking reaction
        if: always()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ inputs.repo }}
          COMMENT_ID: ${{ inputs.comment-id }}
          REACTION_ID: ${{ steps.reaction.outputs.reaction_id }}
        run: |
          # Remove the 👀 reaction now that we've responded (or failed).
          # No replacement reaction — clean slate, no noise.
          if [ -n "$REACTION_ID" ]; then
            gh api "repos/$REPO/issues/comments/$COMMENT_ID/reactions/$REACTION_ID" \
              --method DELETE 2>/dev/null || true
          fi
