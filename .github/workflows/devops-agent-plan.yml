name: gravity-devops-agent — plan

# Reusable workflow: per-stack `terragrunt plan` (or raw `terraform plan`)
# triggered on a pull request. Posts a sticky PR comment per stack, uploads
# the binary plan as an artifact, optionally gates on a Conftest/OPA policy
# bundle.
#
# This is the v0 (CI-bound) implementation of the gravity-devops-agent's
# plan-on-PR behavior. v1 will replace the workflow body with a bridge
# subscriber in src/gravity_agent/bridges/devops/, but the external contract
# (artifacts, comments, status checks) is preserved so callers don't change
# when the brain moves into Gravity.
#
# Engine auto-detection:
#   - If <working-directory>/terragrunt.hcl exists (and is not in .terragrunt-cache),
#     uses Terragrunt.
#   - Else if any *.tf or *.tofu file exists, uses raw Terraform/OpenTofu.
#   - Else fails with a clear error.
# The detected engine is recorded in the artifact so the apply workflow uses
# the same engine.
#
# The artifact name is deterministic so the apply workflow can find it by
# stack-id + run-id.

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Stack directory (relative to repo root). Required."
        required: true
        type: string
      stack-id:
        description: "Stable identifier used in artifact names and PR comments. Defaults to working-directory with '/' replaced by '-'."
        required: false
        type: string
        default: ""
      terraform-version:
        description: "Terraform version to install."
        required: false
        type: string
        default: "1.15.2"
      terragrunt-version:
        description: "Terragrunt version to install. Used only when terragrunt.hcl is detected."
        required: false
        type: string
        default: "0.99.5"
      aws-role-to-assume:
        description: "ARN of the AWS role to assume via OIDC. Defaults to vars.AWS_TF_ROLE_TO_ASSUME."
        required: false
        type: string
        default: ""
      aws-region:
        description: "AWS region. Defaults to vars.AWS_REGION, then us-east-2."
        required: false
        type: string
        default: ""
      policy-dir:
        description: "Path to a Conftest/OPA policy directory. When set, runs `conftest test` against the JSON-rendered plan."
        required: false
        type: string
        default: ""
      conftest-version:
        description: "Conftest version to install when policy-dir is set."
        required: false
        type: string
        default: "0.59.0"
      runs-on:
        description: "Runner label."
        required: false
        type: string
        default: "ubuntu-latest"
      destroy:
        description: "When true, runs `plan -destroy`. Used by destroy-flow PRs."
        required: false
        type: boolean
        default: false
    outputs:
      plan-artifact:
        description: "Name of the uploaded plan artifact."
        value: ${{ jobs.plan.outputs.plan-artifact }}
      stack-id:
        description: "Resolved stack identifier."
        value: ${{ jobs.plan.outputs.stack-id }}
      engine:
        description: "Detected engine: 'terragrunt' or 'terraform'."
        value: ${{ jobs.plan.outputs.engine }}
      has-changes:
        description: "true if the plan reports any resource changes."
        value: ${{ jobs.plan.outputs.has-changes }}
      bootstrap:
        description: "true when AWS_TF_ROLE_TO_ASSUME is unset and the workflow ran in bootstrap mode (no plan was performed)."
        value: ${{ jobs.plan.outputs.bootstrap }}

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  plan:
    runs-on: ${{ inputs.runs-on }}
    outputs:
      plan-artifact: ${{ steps.resolve.outputs.plan_artifact }}
      stack-id: ${{ steps.resolve.outputs.stack_id }}
      engine: ${{ steps.detect.outputs.engine }}
      has-changes: ${{ steps.summarize.outputs.has_changes }}
      bootstrap: ${{ steps.resolve.outputs.bootstrap }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve configuration
        id: resolve
        env:
          INPUT_WORKING_DIRECTORY: ${{ inputs.working-directory }}
          INPUT_STACK_ID: ${{ inputs.stack-id }}
          INPUT_AWS_REGION: ${{ inputs.aws-region }}
          INPUT_AWS_ROLE_TO_ASSUME: ${{ inputs.aws-role-to-assume }}
          VAR_AWS_REGION: ${{ vars.AWS_REGION }}
          VAR_AWS_TF_ROLE_TO_ASSUME: ${{ vars.AWS_TF_ROLE_TO_ASSUME }}
        run: |
          set -euo pipefail

          if [ -z "$INPUT_WORKING_DIRECTORY" ]; then
            echo "::error::Input working-directory is required."
            exit 1
          fi
          if [ ! -d "$INPUT_WORKING_DIRECTORY" ]; then
            echo "::error::working-directory '$INPUT_WORKING_DIRECTORY' does not exist."
            exit 1
          fi

          STACK_ID="$INPUT_STACK_ID"
          if [ -z "$STACK_ID" ]; then
            STACK_ID=$(echo "$INPUT_WORKING_DIRECTORY" | tr '/' '-' | sed 's/^-//;s/-$//')
          fi

          AWS_REGION="${INPUT_AWS_REGION:-${VAR_AWS_REGION:-us-east-2}}"
          AWS_ROLE_TO_ASSUME="${INPUT_AWS_ROLE_TO_ASSUME:-${VAR_AWS_TF_ROLE_TO_ASSUME:-}}"

          # Bootstrap mode: when the AWS role isn't configured, we're either
          # (a) on a freshly initialized infra repo before shared-infra-baseline
          # has been applied, or (b) on an existing repo whose
          # AWS_TF_ROLE_TO_ASSUME repo var was never set. In both cases we
          # emit a clear notice and exit cleanly rather than failing every PR
          # with a wall of red. The intent: the agent is self-bootstrapping —
          # adopting it on a new repo costs zero CI noise.
          BOOTSTRAP=false
          if [ -z "$AWS_ROLE_TO_ASSUME" ]; then
            BOOTSTRAP=true
            echo "::notice title=gravity-devops-agent (bootstrap mode)::AWS_TF_ROLE_TO_ASSUME is not configured for this repo. Skipping plan for $STACK_ID. Set the repo variable to enable plans. See gravity-devops-agent docs for setup."
          fi

          # Plan-artifact name is the contract the apply workflow consumes.
          # Keyed on stack-id + caller run-id + attempt so it's stable per
          # CI run. NOTE: caller lookups use `startswith("devops-agent-plan-${stack_id}-")`
          # so this MUST keep the full stack_id; do not truncate.
          PLAN_ARTIFACT="devops-agent-plan-${STACK_ID}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          # AWS roleSessionName has a hard 64-char limit (alphanumeric +
          # `+=,.@-_`). For deep stack paths (e.g.
          # `live-infinity-aws-shared-infrastructure-us-east-2-shared-infra-baseline`,
          # 71 chars) the previous template `devops-agent-plan-${STACK_ID}-${RUN_ID}`
          # exceeded the limit and AssumeRoleWithWebIdentity failed. Truncate
          # the stack-id to its tail (most-distinguishing portion) so the
          # session name always fits. Budget:
          #   64 - len("devops-agent-plan-") - len("-") - len(run-id, max 12)
          #   = 64 - 18 - 1 - 12 = 33 chars for the stack tail.
          # Bash `${VAR: -N}` returns the last N chars (or full string if shorter).
          SESSION_TAIL="${STACK_ID: -33}"
          ROLE_SESSION_NAME="devops-agent-plan-${SESSION_TAIL}-${GITHUB_RUN_ID}"
          # Final safety: hard-truncate to 64 chars in case run-id is unexpectedly long.
          ROLE_SESSION_NAME="${ROLE_SESSION_NAME:0:64}"

          {
            echo "stack_id=$STACK_ID"
            echo "aws_region=$AWS_REGION"
            echo "aws_role_to_assume=$AWS_ROLE_TO_ASSUME"
            echo "plan_artifact=$PLAN_ARTIFACT"
            echo "role_session_name=$ROLE_SESSION_NAME"
            echo "bootstrap=$BOOTSTRAP"
          } >> "$GITHUB_OUTPUT"

      - name: Detect engine
        id: detect
        if: steps.resolve.outputs.bootstrap != 'true'
        working-directory: ${{ inputs.working-directory }}
        run: |
          set -euo pipefail
          if [ -f terragrunt.hcl ]; then
            ENGINE=terragrunt
          elif compgen -G "*.tf" > /dev/null || compgen -G "*.tofu" > /dev/null; then
            ENGINE=terraform
          else
            echo "::error::No terragrunt.hcl, *.tf, or *.tofu in $PWD; cannot detect engine."
            exit 1
          fi
          echo "engine=$ENGINE" >> "$GITHUB_OUTPUT"
          echo "Detected engine: $ENGINE"

      - name: Set up Terraform
        if: steps.resolve.outputs.bootstrap != 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform-version }}
          terraform_wrapper: false

      - name: Set up Terragrunt
        if: ${{ steps.resolve.outputs.bootstrap != 'true' && steps.detect.outputs.engine == 'terragrunt' }}
        env:
          TG_VERSION: ${{ inputs.terragrunt-version }}
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64" \
            -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt
          terragrunt --version

      - name: Set up Conftest
        if: ${{ steps.resolve.outputs.bootstrap != 'true' && inputs.policy-dir != '' }}
        env:
          CONFTEST_VERSION: ${{ inputs.conftest-version }}
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" \
            | tar -xz -C /usr/local/bin conftest
          conftest --version

      - name: Configure AWS (OIDC)
        if: steps.resolve.outputs.bootstrap != 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.resolve.outputs.aws_role_to_assume }}
          aws-region: ${{ steps.resolve.outputs.aws_region }}
          role-session-name: ${{ steps.resolve.outputs.role_session_name }}

      - name: Init
        if: steps.resolve.outputs.bootstrap != 'true'
        working-directory: ${{ inputs.working-directory }}
        env:
          ENGINE: ${{ steps.detect.outputs.engine }}
        run: |
          set -euo pipefail
          if [ "$ENGINE" = "terragrunt" ]; then
            terragrunt init --non-interactive -reconfigure
          else
            terraform init -reconfigure -input=false
          fi

      - name: Plan
        id: plan
        if: steps.resolve.outputs.bootstrap != 'true'
        working-directory: ${{ inputs.working-directory }}
        env:
          ENGINE: ${{ steps.detect.outputs.engine }}
          DESTROY: ${{ inputs.destroy }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/plan"

          PLAN_ARGS=(-no-color -input=false -lock-timeout=10m -out="$RUNNER_TEMP/plan/plan.bin")
          if [ "$DESTROY" = "true" ]; then
            PLAN_ARGS+=(-destroy)
          fi

          # detailed-exitcode: 0=no diff, 1=error, 2=diff. Treat 1 as failure.
          set +e
          if [ "$ENGINE" = "terragrunt" ]; then
            terragrunt plan --non-interactive -detailed-exitcode "${PLAN_ARGS[@]}" \
              2>&1 | tee "$RUNNER_TEMP/plan/plan.txt"
          else
            terraform plan -detailed-exitcode "${PLAN_ARGS[@]}" \
              2>&1 | tee "$RUNNER_TEMP/plan/plan.txt"
          fi
          PLAN_EXIT=${PIPESTATUS[0]}
          set -e

          if [ "$PLAN_EXIT" = "1" ]; then
            echo "::error::Plan failed for $PWD"
            exit 1
          fi

          # Render JSON for Conftest and the summary.
          terraform show -json "$RUNNER_TEMP/plan/plan.bin" > "$RUNNER_TEMP/plan/plan.json"

          # Record metadata so the apply workflow validates engine match.
          jq -n \
            --arg engine "$ENGINE" \
            --arg stack_id "${{ steps.resolve.outputs.stack_id }}" \
            --arg destroy "$DESTROY" \
            --arg run_id "$GITHUB_RUN_ID" \
            --arg head_sha "$GITHUB_SHA" \
            '{engine: $engine, stack_id: $stack_id, destroy: ($destroy == "true"), run_id: $run_id, head_sha: $head_sha}' \
            > "$RUNNER_TEMP/plan/metadata.json"

          {
            echo "plan_dir=$RUNNER_TEMP/plan"
            echo "plan_exit=$PLAN_EXIT"
          } >> "$GITHUB_OUTPUT"

      - name: Conftest gate
        if: ${{ steps.resolve.outputs.bootstrap != 'true' && inputs.policy-dir != '' }}
        env:
          POLICY_DIR: ${{ inputs.policy-dir }}
          PLAN_DIR: ${{ steps.plan.outputs.plan_dir }}
        run: |
          set -euo pipefail
          conftest test --policy "$POLICY_DIR" "$PLAN_DIR/plan.json"

      - name: Summarize plan
        id: summarize
        if: steps.resolve.outputs.bootstrap != 'true'
        env:
          PLAN_DIR: ${{ steps.plan.outputs.plan_dir }}
          PLAN_EXIT: ${{ steps.plan.outputs.plan_exit }}
          STACK_ID: ${{ steps.resolve.outputs.stack_id }}
          DESTROY: ${{ inputs.destroy }}
          ENGINE: ${{ steps.detect.outputs.engine }}
        run: |
          set -euo pipefail

          HAS_CHANGES=false
          if [ "$PLAN_EXIT" = "2" ]; then
            HAS_CHANGES=true
          fi
          echo "has_changes=$HAS_CHANGES" >> "$GITHUB_OUTPUT"

          ADDS=$(jq '[.resource_changes[]? | select(.change.actions | index("create"))] | length' "$PLAN_DIR/plan.json")
          CHANGES=$(jq '[.resource_changes[]? | select(.change.actions | index("update"))] | length' "$PLAN_DIR/plan.json")
          DESTROYS=$(jq '[.resource_changes[]? | select(.change.actions | index("delete"))] | length' "$PLAN_DIR/plan.json")
          REPLACES=$(jq '[.resource_changes[]? | select((.change.actions | index("delete")) and (.change.actions | index("create")))] | length' "$PLAN_DIR/plan.json")
          DESTROY_NAMES=$(jq -r '
            [.resource_changes[]? | select(.change.actions | index("delete")) | "\(.address) (\(.type))"] | .[]
          ' "$PLAN_DIR/plan.json" | head -50)

          {
            echo "stack_id=$STACK_ID"
            echo "adds=$ADDS"
            echo "changes=$CHANGES"
            echo "destroys=$DESTROYS"
            echo "replaces=$REPLACES"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## DevOps Agent — Plan: \`$STACK_ID\`"
            echo ""
            echo "**Engine**: \`$ENGINE\`"
            if [ "$DESTROY" = "true" ]; then
              echo "**Mode**: \`-destroy\`"
            fi
            echo "**Adds**: $ADDS  **Changes**: $CHANGES  **Destroys**: $DESTROYS  **Replaces**: $REPLACES"
            if [ "$DESTROYS" -gt 0 ] || [ "$REPLACES" -gt 0 ]; then
              echo ""
              echo "### Resources DESTROYED or REPLACED"
              echo ""
              echo '```'
              echo "$DESTROY_NAMES"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload plan artifact
        if: steps.resolve.outputs.bootstrap != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.resolve.outputs.plan_artifact }}
          path: ${{ steps.plan.outputs.plan_dir }}
          retention-days: 14
          if-no-files-found: error

      - name: Comment plan on PR
        if: ${{ steps.resolve.outputs.bootstrap != 'true' && github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        env:
          PLAN_DIR: ${{ steps.plan.outputs.plan_dir }}
          STACK_ID: ${{ steps.resolve.outputs.stack_id }}
          ENGINE: ${{ steps.detect.outputs.engine }}
          ADDS: ${{ steps.summarize.outputs.adds }}
          CHANGES: ${{ steps.summarize.outputs.changes }}
          DESTROYS: ${{ steps.summarize.outputs.destroys }}
          REPLACES: ${{ steps.summarize.outputs.replaces }}
          PLAN_ARTIFACT: ${{ steps.resolve.outputs.plan_artifact }}
          DESTROY: ${{ inputs.destroy }}
          POLICY_DIR: ${{ inputs.policy-dir }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const planText = fs.readFileSync(path.join(process.env.PLAN_DIR, 'plan.txt'), 'utf8');

            const MAX = 60000;
            const body = planText.length > MAX
              ? planText.slice(0, MAX) + '\n\n... (truncated, see workflow artifact for full plan)'
              : planText;

            const marker = `<!-- devops-agent-plan:${process.env.STACK_ID} -->`;
            const destroyBanner = process.env.DESTROY === 'true'
              ? '> :warning: **DESTROY PLAN** — this PR is plan-as-destroy.\n\n'
              : '';
            const policyLine = process.env.POLICY_DIR
              ? `Policy: \`${process.env.POLICY_DIR}\` ✅\n`
              : 'Policy: _none configured_\n';

            const header = [
              marker,
              `### gravity-devops-agent — Plan \`${process.env.STACK_ID}\``,
              '',
              destroyBanner,
              `**Engine**: \`${process.env.ENGINE}\``,
              `**Adds**: ${process.env.ADDS}  **Changes**: ${process.env.CHANGES}  **Destroys**: ${process.env.DESTROYS}  **Replaces**: ${process.env.REPLACES}`,
              '',
              policyLine,
              `Artifact: \`${process.env.PLAN_ARTIFACT}\`  (downloadable from the workflow run)`,
              '',
              'When this PR is approved by a CODEOWNER for every affected path, the DevOps Agent will apply this plan in dependency order and auto-merge on success. On failure, approvals are dismissed and a postmortem comment is posted.',
              '',
              '<details><summary>Full plan output</summary>',
              '',
              '```hcl',
              body,
              '```',
              '',
              '</details>',
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find(c =>
              c.user && c.user.type === 'Bot' && c.body && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body: header,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body: header,
              });
            }

      - name: Comment bootstrap notice on PR
        if: ${{ steps.resolve.outputs.bootstrap == 'true' && github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            // ONE bootstrap comment per repo (not per stack). The marker is
            // intentionally not stack-scoped so a multi-stack PR doesn't post
            // N identical notices.
            const marker = `<!-- devops-agent-bootstrap -->`;
            const body = [
              marker,
              `### gravity-devops-agent — Bootstrap mode`,
              '',
              `This repo does not yet have \`AWS_TF_ROLE_TO_ASSUME\` configured, so the agent is running in **bootstrap mode**: plan and apply are skipped, no IAM credentials are assumed, no cloud calls are made.`,
              '',
              `**To enable plans + applies:**`,
              '',
              `1. Apply \`shared-infra-baseline\` for this BU (provisions the \`github-actions-tf-plan\` and \`github-actions-tf-apply\` IAM roles).`,
              `2. Set the role ARNs as repo variables:`,
              `   \`\`\`bash`,
              `   gh variable set AWS_TF_ROLE_TO_ASSUME --repo <org>/<repo> --body "<tf_plan_role_arn>"`,
              `   gh variable set AWS_TF_APPLY_ROLE_TO_ASSUME --repo <org>/<repo> --body "<tf_apply_role_arn>"`,
              `   \`\`\``,
              `3. Re-run this workflow.`,
              '',
              `Operational references: \`devshop-infra/AGENTS.md\` (\`## IaC orchestration via gravity-devops-agent\`) and \`infinity-constellation/ci-workflows/README.md\` (\`## gravity-devops-agent (v0): IaC orchestration\`). This notice will go away once the role var is set.`,
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find(c =>
              c.user && c.user.type === 'Bot' && c.body && c.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body,
              });
            }
