name: gravity-devops-agent — postmortem

# Reusable workflow: dispatched by devops-agent-apply.yml when an apply
# fails. Dismisses all current PR approvals, adds an `apply-failure` label,
# and posts a structured postmortem comment with per-stack outcome and
# suggested next steps from a static playbook.
#
# v0 (CI-bound) implementation. v1 maps to
# DevOpsBridge.handle_apply_failure() in src/gravity_agent/bridges/devops/.
#
# v0 explicitly does NOT call an LLM. Postmortem comments are structured:
# which stacks applied, which failed, error tail, and a static dispatch on
# known error patterns to suggested next steps. v0.5 may add an optional
# Bedrock-backed suggester behind a feature flag.

on:
  workflow_call:
    inputs:
      pr-number:
        description: "Pull request number that failed."
        required: true
        type: number
      apply-run-id:
        description: "GH Actions run ID of the failed apply (for log retrieval / linking)."
        required: true
        type: string
      applied-stacks:
        description: "JSON array of stack_ids that applied successfully before the failure."
        required: false
        type: string
        default: "[]"
      failed-stack:
        description: "stack_id of the stack that failed."
        required: true
        type: string
      stacks:
        description: "JSON array of all stacks the PR was attempting to apply (for skipped-list)."
        required: true
        type: string
      approver-login:
        description: "Login of the approver whose approval triggered the failed apply."
        required: true
        type: string
      head-sha:
        description: "PR head SHA (for check-run attachment). Optional — resolved from PR if omitted."
        required: false
        type: string
        default: ""
      runs-on:
        description: "Runner label."
        required: false
        type: string
        default: "ubuntu-latest"

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  postmortem:
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Generate gravity-devops-agent token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GRAVITY_DEVOPS_AGENT_APP_ID }}
          private-key: ${{ secrets.GRAVITY_DEVOPS_AGENT_PRIVATE_KEY }}

      - name: Resolve head SHA
        id: head
        env:
          PR_NUMBER: ${{ inputs.pr-number }}
          INPUT_SHA: ${{ inputs.head-sha }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          if [ -n "$INPUT_SHA" ]; then
            echo "sha=$INPUT_SHA" >> "$GITHUB_OUTPUT"
          else
            SHA=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json headRefOid --jq .headRefOid)
            echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Start check run
        id: check-run-start
        uses: infinity-constellation/ci-workflows/.github/actions/check-run@main
        with:
          app-token: ${{ steps.app-token.outputs.token }}
          name: gravity-devops-agent / postmortem
          head-sha: ${{ steps.head.outputs.sha }}
          status: in_progress
          title: Postmortem PR ${{ inputs.pr-number }}

      - name: Dismiss all current approvals
        uses: actions/github-script@v9
        env:
          PR_NUMBER: ${{ inputs.pr-number }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const issue_number = parseInt(process.env.PR_NUMBER, 10);
            const { owner, repo } = context.repo;

            // List reviews; dismiss every review currently in APPROVED state.
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner, repo, pull_number: issue_number, per_page: 100,
            });
            const approved = reviews.filter(r => r.state === 'APPROVED');
            for (const r of approved) {
              try {
                await github.rest.pulls.dismissReview({
                  owner, repo, pull_number: issue_number,
                  review_id: r.id,
                  message: 'gravity-devops-agent: apply failed; please re-review after fixing.',
                });
                core.info(`Dismissed approval ${r.id} by @${r.user && r.user.login}`);
              } catch (err) {
                core.warning(`Could not dismiss review ${r.id}: ${err.message}`);
              }
            }

      - name: Add apply-failure label
        uses: actions/github-script@v9
        env:
          PR_NUMBER: ${{ inputs.pr-number }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const issue_number = parseInt(process.env.PR_NUMBER, 10);
            const { owner, repo } = context.repo;
            try {
              await github.rest.issues.addLabels({
                owner, repo, issue_number, labels: ['apply-failure'],
              });
            } catch (err) {
              // Label may not exist yet; create it then retry.
              try {
                await github.rest.issues.createLabel({
                  owner, repo, name: 'apply-failure',
                  color: 'b60205',
                  description: 'gravity-devops-agent: apply failed on this PR',
                });
                await github.rest.issues.addLabels({
                  owner, repo, issue_number, labels: ['apply-failure'],
                });
              } catch (e2) {
                core.warning(`Could not add apply-failure label: ${e2.message}`);
              }
            }

      - name: Fetch failed apply log tail
        id: fetch
        env:
          REPO: ${{ github.repository }}
          RUN_ID: ${{ inputs.apply-run-id }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          FAILED_STACK: ${{ inputs.failed-stack }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/postmortem"
          # Download all logs for the failed run; extract the failed-stack
          # apply step's log tail. gh run view --log dumps the entire run.
          gh run view "$RUN_ID" --repo "$REPO" --log > "$RUNNER_TEMP/postmortem/full.log" 2>&1 || true

          # The apply step prints "applying: <stack-id>" as a header before
          # each stack. Extract the section between the failed stack header
          # and the next header (or EOF).
          awk -v target="applying: $FAILED_STACK" '
            $0 ~ target { capture=1 }
            capture { print }
            /^=+$/ && capture && NR > 5 { /* keep capturing through closing line */ }
          ' "$RUNNER_TEMP/postmortem/full.log" \
            | tail -n 100 \
            > "$RUNNER_TEMP/postmortem/tail.txt" || true

          # If the awk produced nothing, fall back to last 100 lines of full log.
          if [ ! -s "$RUNNER_TEMP/postmortem/tail.txt" ]; then
            tail -n 100 "$RUNNER_TEMP/postmortem/full.log" > "$RUNNER_TEMP/postmortem/tail.txt"
          fi

          echo "tail_file=$RUNNER_TEMP/postmortem/tail.txt" >> "$GITHUB_OUTPUT"

          # Emit content as an output too (truncated to 4000 chars for LLM context).
          TAIL_CONTENT=$(cat "$RUNNER_TEMP/postmortem/tail.txt" | head -c 4000 || true)
          {
            echo "tail_content<<__TAIL_EOF__"
            echo "$TAIL_CONTENT"
            echo "__TAIL_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Enrich with LLM
        id: llm
        uses: infinity-constellation/ci-workflows/.github/actions/llm-comment@main
        with:
          event-type: apply-failure
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          context-json: >-
            {
              "failed_stack": "${{ inputs.failed-stack }}",
              "applied_stacks": ${{ inputs.applied-stacks || '[]' }},
              "approver": "${{ inputs.approver-login }}",
              "pr_number": ${{ inputs.pr-number }},
              "apply_run_id": "${{ inputs.apply-run-id }}",
              "error_log": ${{ toJSON(steps.fetch.outputs.tail_content) }}
            }

      - name: Post structured postmortem comment
        uses: actions/github-script@v9
        env:
          PR_NUMBER: ${{ inputs.pr-number }}
          FAILED_STACK: ${{ inputs.failed-stack }}
          APPLIED_JSON: ${{ inputs.applied-stacks }}
          STACKS_JSON: ${{ inputs.stacks }}
          APPROVER: ${{ inputs.approver-login }}
          APPLY_RUN_ID: ${{ inputs.apply-run-id }}
          REPO: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
          TAIL_FILE: ${{ steps.fetch.outputs.tail_file }}
          LLM_DISPLAY_NAME: ${{ steps.llm.outputs.display_name }}
          LLM_SUMMARY: ${{ steps.llm.outputs.summary }}
          LLM_DETAILS: ${{ steps.llm.outputs.details }}
          LLM_CTA: ${{ steps.llm.outputs.cta }}
          LLM_DIAGNOSIS: ${{ steps.llm.outputs.diagnosis }}
          LLM_FIX: ${{ steps.llm.outputs.fix }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fs       = require('fs');
            const marker   = `<!-- devops-agent-postmortem -->`;
            const failed   = process.env.FAILED_STACK;
            const applied  = JSON.parse(process.env.APPLIED_JSON || '[]');
            const stacks   = JSON.parse(process.env.STACKS_JSON  || '[]').map(s => s.stack_id);
            const skipped  = stacks.filter(s => !applied.includes(s) && s !== failed);
            const runUrl   = `${process.env.SERVER_URL}/${process.env.REPO}/actions/runs/${process.env.APPLY_RUN_ID}`;
            const tail     = fs.readFileSync(process.env.TAIL_FILE, 'utf8').slice(-12000);

            const displayName  = process.env.LLM_DISPLAY_NAME || failed;
            const llmSummary   = process.env.LLM_SUMMARY   || '';
            const llmDetails   = process.env.LLM_DETAILS   || '';
            const llmCta       = process.env.LLM_CTA       || 'Fix the error below and push a new commit to re-trigger the plan.';
            const llmDiagnosis = process.env.LLM_DIAGNOSIS || '';
            const llmFix       = process.env.LLM_FIX       || '';

            function shortId(id) { return (id||'').split('-').slice(-3).join('-') || id; }

            const lines = [
              marker,
              `#### Postmortem — \`${displayName}\``,
              '',
              `Approved by @${process.env.APPROVER} · [apply run](${runUrl})`,
            ];

            if (llmSummary)   { lines.push('', llmSummary); }
            if (llmDetails)   { lines.push('', llmDetails); }
            if (llmDiagnosis) { lines.push('', `**Root cause:** ${llmDiagnosis}`); }
            if (llmFix)       { lines.push('', `**Fix:**`, llmFix); }

            if (applied.length > 0) {
              lines.push('', '**Applied before failure:**');
              lines.push(applied.map(s => `- ✅ \`${shortId(s)}\``).join('\n'));
            }
            if (skipped.length > 0) {
              lines.push('', '**Skipped (downstream of failure):**');
              lines.push(skipped.map(s => `- ⏭️ \`${shortId(s)}\``).join('\n'));
            }

            lines.push(
              '',
              `<details><summary>Failed stack log tail</summary>`,
              '',
              '```',
              tail,
              '```',
              '',
              '</details>',
              '',
              `> ${llmCta}`,
            );

            const body = lines.join('\n');
            const issue_number = parseInt(process.env.PR_NUMBER, 10);
            const { owner, repo } = context.repo;
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Complete check run
        if: always() && steps.check-run-start.outputs.check-run-id != ''
        uses: infinity-constellation/ci-workflows/.github/actions/check-run@main
        with:
          app-token: ${{ steps.app-token.outputs.token }}
          name: gravity-devops-agent / postmortem
          head-sha: ${{ steps.head.outputs.sha }}
          status: completed
          conclusion: ${{ job.status == 'success' && 'neutral' || 'failure' }}
          check-run-id: ${{ steps.check-run-start.outputs.check-run-id }}
          title: ${{ job.status == 'success' && 'Postmortem complete' || 'Postmortem failed' }}
